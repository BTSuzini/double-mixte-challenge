<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Repas — Open BT Bricorama</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=20260406-open-repas-v1" />

  <style>
    :root{
      --bg: #f4f1ea;
      --card: rgba(255,255,255,.92);
      --card-strong: rgba(255,255,255,.96);
      --text: #17212b;
      --muted: #667085;
      --border: rgba(16,24,40,.08);
      --shadow: 0 16px 40px rgba(16,24,40,.10);

      --yellow: #ffd400;
      --yellow-dark: #efc000;
      --sun-orange: #ff8a2a;
      --sun-red: #d94b2b;
      --sun-pink: #d94f7a;
      --violet: #6b2bd9;
      --night: #0f1e35;
      --deep-blue: #183b68;
      --sea: #1e6fa8;
      --green: #1f7a3a;
      --dark: #111827;

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;

      --container: 1180px;
      --header-h: 146px;
    }

    *{ box-sizing:border-box; }

    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,202,64,.18), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(217,79,122,.14), transparent 24%),
        linear-gradient(180deg, #f6f2ea 0%, #f3f0eb 100%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
    }

    .container{
      width:min(var(--container), calc(100% - 28px));
      margin:0 auto;
    }

    /* =========================
       HEADER UNIQUE
    ========================= */
    .site-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:1000;
      background:linear-gradient(135deg, var(--yellow), #ffe25d 52%, var(--yellow-dark));
      border-bottom:1px solid rgba(0,0,0,.06);
      box-shadow:0 10px 24px rgba(255,212,0,.22);
    }

    .header-inner{
      min-height:var(--header-h);
      display:grid;
      grid-template-columns:70px 1fr 70px;
      grid-template-rows:auto auto;
      align-items:center;
      gap:10px 18px;
      padding:10px 0 12px;
    }

    .header-logo{
      width:70px;
      height:70px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .header-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      filter:drop-shadow(0 6px 10px rgba(0,0,0,.14));
    }

    .header-logo.left{
      grid-column:1;
      grid-row:1;
      justify-self:start;
    }

    .header-logo.center{
      grid-column:2;
      grid-row:1;
      justify-self:center;
      width:min(320px, 100%);
      height:70px;
    }

    .header-logo.right{
      grid-column:3;
      grid-row:1;
      justify-self:end;
    }

    .header-logo.center img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .header-nav-wrap{
      grid-column:1 / 4;
      grid-row:2;
      position:relative;
    }

    .header-nav-wrap::before,
    .header-nav-wrap::after{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:3;
      width:34px;
      height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      font-weight:1000;
      color:rgba(23,33,43,.58);
      pointer-events:none;
    }

    .header-nav-wrap::before{
      content:"‹";
      left:0;
      background:linear-gradient(90deg, rgba(255,221,58,.92) 0%, rgba(255,221,58,.72) 48%, rgba(255,221,58,0) 100%);
      border-top-left-radius:999px;
      border-bottom-left-radius:999px;
    }

    .header-nav-wrap::after{
      content:"›";
      right:0;
      background:linear-gradient(270deg, rgba(255,221,58,.92) 0%, rgba(255,221,58,.72) 48%, rgba(255,221,58,0) 100%);
      border-top-right-radius:999px;
      border-bottom-right-radius:999px;
    }

    .header-nav{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      padding:2px 34px 0;
      scroll-padding-left:34px;
      scroll-padding-right:34px;
    }

    .header-nav::-webkit-scrollbar{
      display:none;
    }

    .nav-link{
      flex:0 0 auto;
      min-height:42px;
      padding:10px 18px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.82));
      border:1px solid rgba(255,255,255,.55);
      color:#344054;
      font-size:14px;
      font-weight:900;
      white-space:nowrap;
      box-shadow:
        0 8px 18px rgba(0,0,0,.10),
        inset 0 1px 0 rgba(255,255,255,.7);
      transition:transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .nav-link:hover{
      transform:translateY(-1px);
      box-shadow:
        0 10px 20px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.7);
    }

    .nav-link.primary{
      background:linear-gradient(180deg, #2ea44f, #1f7a3a);
      color:#fff;
      border-color:rgba(0,0,0,.06);
      box-shadow:
        0 10px 18px rgba(31,122,58,.24),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    /* =========================
       MAIN
    ========================= */
    main{
      padding-top:calc(var(--header-h) + 24px);
      padding-bottom:40px;
    }

    .section{
      margin-top:22px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:32px;
      padding:28px 22px 24px;
      color:#fff;
      box-shadow:
        0 20px 44px rgba(16,24,40,.16),
        inset 0 0 0 1px rgba(255,255,255,.06);
      background:
        radial-gradient(circle at 50% 68%, rgba(255,212,0,.40), transparent 18%),
        radial-gradient(circle at 30% 18%, rgba(255,138,42,.55), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(217,79,122,.44), transparent 20%),
        linear-gradient(180deg, #24132e 0%, #6c2c2f 32%, #e1782d 68%, #f7b257 100%);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 100%, rgba(0,0,0,.28), transparent 32%),
        linear-gradient(180deg, rgba(7,16,32,.08), rgba(7,16,32,.18));
      pointer-events:none;
    }

    .hero-inner{
      position:relative;
      z-index:1;
      display:grid;
      gap:18px;
    }

    .hero-topline{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .hero-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:#fff6d8;
      font-size:13px;
      font-weight:800;
      letter-spacing:.02em;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
      backdrop-filter:blur(8px);
    }

    .hero-content{
      text-align:center;
      max-width:900px;
      margin:0 auto;
    }

    .hero-title{
      margin:0;
      font-size:clamp(30px, 5vw, 54px);
      line-height:1;
      letter-spacing:-0.04em;
      font-weight:900;
      text-shadow:0 10px 24px rgba(0,0,0,.20);
    }

    .hero-sub{
      margin:12px auto 0;
      max-width:760px;
      font-size:16px;
      line-height:1.55;
      color:rgba(255,255,255,.95);
      font-weight:600;
    }

    .panel{
      background:var(--card);
      border:1px solid rgba(255,255,255,.35);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:20px;
    }

    .repas-card{
      padding:10px;
    }

    .repas-img{
      width:100%;
      height:auto;
      display:block;
      border-radius:18px;
      box-shadow:0 10px 24px rgba(0,0,0,.10);
    }

    @media (min-width: 760px){
      :root{
        --header-h: 158px;
      }

      .header-inner{
        grid-template-columns:90px 1fr 90px;
        gap:12px 22px;
      }

      .header-logo{
        width:90px;
        height:90px;
      }

      .header-logo.center{
        height:78px;
        width:min(420px, 100%);
      }

      .header-nav-wrap::before,
      .header-nav-wrap::after{
        width:42px;
        height:50px;
        font-size:20px;
      }

      .header-nav{
        padding-left:42px;
        padding-right:42px;
        justify-content:center;
      }

      .panel{
        padding:24px;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="header-logo left">
        <img src="../assets/img/blason-suzini.png" alt="Blason Suzini">
      </div>

      <div class="header-logo center">
        <img src="../assets/img/openbt.png" alt="Open BT Bricorama">
      </div>

      <div class="header-logo right">
        <img src="../assets/img/BT500.png" alt="BT500">
      </div>

      <div class="header-nav-wrap">
        <nav class="header-nav">
          <a class="nav-link" href="../index.html">🏠 Accueil</a>
          <a class="nav-link" href="equipes.html">👥 Équipes</a>
          <a class="nav-link" href="programmation.html">📅 Programmation</a>
          <a class="nav-link" href="classements.html">🏆 Résultats</a>
          <a class="nav-link" href="reglement.html">📘 Règlement</a>
          <a class="nav-link" href="inscriptions.html">📝 Inscriptions</a>
          <a class="nav-link" href="boutique.html">🛍️ Boutique</a>
          <a class="nav-link primary" href="repas.html">🍽️ Repas</a>
          <a class="nav-link" href="tirage.html">🎲 Tirage</a>
          <a class="nav-link" href="infos.html">ℹ️ Infos</a>
          <a class="nav-link" href="contact.html">📩 Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">

    <section class="section">
      <div class="hero">
        <div class="hero-inner">
          <div class="hero-topline">
            <span class="hero-pill">Open BT Bricorama</span>
            <span class="hero-pill">🍽️ Repas</span>
            <span class="hero-pill">BT500</span>
          </div>

          <div class="hero-content">
            <h1 class="hero-title">Carte repas</h1>
            <p class="hero-sub">
              Retrouvez ici la carte proposée pour l’Open BT Bricorama.
            </p>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="panel repas-card">
        <img
          src="../assets/img/cartebt500.jpeg"
          alt="Carte repas Open BT Bricorama"
          class="repas-img"
        >
      </div>
    </section>

  </main>

</body>
</html>
