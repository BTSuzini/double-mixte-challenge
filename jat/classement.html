<body>

             alt="Suzini Beach Tennis Double Mixte Challenge"

      </div>

    <nav class="nav">

<main class="container">

  <section class="card" id="accessDenied" style="display:none;">
    <h2 style="margin:0 0 8px;">⛔ Accès refusé</h2>
    <p class="muted" style="margin:0;">Cette page est réservée aux administrateurs et aux JAT.</p>
  </section>

  <section class="card" id="adminUI" style="display:none;">
    <h2 style="margin:0 0 10px;">🎛️ Zone</h2>

    <p class="muted" id="pageSub" style="margin:0 0 10px;">—</p>

    <div class="field">
      <label for="scope">Choisir</label>
      <select id="scope">
        <option value="general">Général</option>
        <option value="etape1">Étape 1</option>
        <option value="etape2">Étape 2</option>
        <option value="etape3">Étape 3</option>
        <option value="etape4">Étape 4</option>
        <option value="etape5">Étape 5</option>
      </select>
    </div>

    <div class="grid" style="margin-top:10px;" id="tabs"></div>
    <p class="muted" id="hint" style="margin-top:10px;"></p>
  </section>

  <section class="card" id="panelNeedStep" style="display:none;">
    <h2 style="margin:0 0 8px;">ℹ️ Choisir une étape</h2>
    <p class="muted" style="margin:0;">
      Sélectionne une <b>Étape</b> dans “Zone” pour consulter/valider le classement.
    </p>
  </section>

  <section class="card" id="panelRank" style="display:none;">
    <h2 style="margin:0 0 10px;">🏆 Classement final</h2>
    <p class="muted" id="statusText" style="margin:0;">Chargement…</p>

    <div class="grid" style="margin-top:12px;">
      <button class="btn" id="btnValidate" style="font-weight:900; color:#111;" disabled>
        ✅ Valider le classement
      </button>
    </div>

    <div id="validatedBox" class="muted" style="margin-top:10px; display:none;"></div>

    <hr class="sep" style="margin-top:14px;" />

    <h3 style="margin:0 0 8px;">👥 Classement des équipes</h3>
    <div id="teamList"></div>

    <hr class="sep" style="margin-top:14px;" />

    <h3 style="margin:0 0 8px;">🧍 Classement des joueurs</h3>
    <div id="playerList"></div>

    <p class="muted" id="helpText" style="margin-top:12px;"></p>
  </section>

</main>

<script type="module">
  import { auth, db } from "../assets/js/firebase.js";
  import { logout, requireRole } from "../assets/js/session.js";

  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    doc, onSnapshot, collection,
    setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const params = new URLSearchParams(location.search);
  const scopeFromUrl = params.get("scope") || "etape5";

  const ETAPE5_INDIVIDUAL_POINTS = {
    1: 350,
    2: 245,
    3: 189,
    4: 147,
    5: 123,
    6: 105,
    7: 91,
    8: 74,
    9: 67,
    10: 61
  };

  const accessDenied = document.getElementById("accessDenied");
  const adminUI = document.getElementById("adminUI");

  const scopeEl = document.getElementById("scope");
  const tabsEl  = document.getElementById("tabs");
  const hintEl  = document.getElementById("hint");
  const pageSub = document.getElementById("pageSub");

  const panelNeedStep = document.getElementById("panelNeedStep");
  const panelRank     = document.getElementById("panelRank");

  const statusText    = document.getElementById("statusText");
  const btnValidate   = document.getElementById("btnValidate");
  const validatedBox  = document.getElementById("validatedBox");
  const helpText      = document.getElementById("helpText");

  const teamList      = document.getElementById("teamList");
  const playerList    = document.getElementById("playerList");

  let currentScope = scopeFromUrl;
  let currentProg = null;
  let resultsByMatch = new Map();
  let currentClassementDoc = null;

  let inscriptions = [];
  let inscriptionsByTeamName = new Map();

  let unsubProg = null;
  let unsubRes  = null;
  let unsubCls  = null;
  let unsubIns  = null;

  function stepLabel(scope){
    if(!scope || scope === "general") return "Général";
    return `Étape ${scope.replace("etape","")}`;
  }

  function esc(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function fmtDate(ts){
    try{
      const d = ts?.toDate ? ts.toDate() : null;
      if(!d) return "—";
      return d.toLocaleString("fr-FR", { year:"numeric", month:"long", day:"numeric", hour:"2-digit", minute:"2-digit" });
    }catch{
      return "—";
    }
  }

  function safeTeamName(x){
    return (x?.teamName || "").toString().trim();
  }

  function normalizeTeamName(s){
    return (s || "")
      .toString()
      .trim()
      .toLowerCase()
      .replaceAll("’","'")
      .replace(/\s+/g, " ");
  }

  function getInscriptionForTeamName(teamName){
    const key = normalizeTeamName(teamName);
    return inscriptionsByTeamName.get(key) || null;
  }

  function currentPageName(){
    const p = (location.pathname || "").split("/").pop() || "";
    return p.toLowerCase();
  }

  function setTabs(scope){
    tabsEl.innerHTML = "";
    const cur = currentPageName();

    function addTab(label, url){
      const a = document.createElement("a");
      a.className = "btn";
      a.href = `${url}?scope=${encodeURIComponent(scope)}`;
      a.textContent = label;

      const isActive = (cur === url.toLowerCase());
      if(isActive){
        a.classList.add("tab-active");
        a.setAttribute("aria-current","page");
      }
      tabsEl.appendChild(a);
    }

    if(scope === "general"){
      hintEl.textContent = "Zone Général : infos (depuis JAT).";
      const a = document.createElement("a");
      a.className = "btn";
      a.href = "index.html?scope=general";
      a.textContent = "📰 Infos";
      a.style.fontWeight = "900";
      if(cur === "index.html"){
        a.classList.add("tab-active");
        a.setAttribute("aria-current","page");
      }
      tabsEl.appendChild(a);
      return;
    }

    hintEl.textContent = "Zone Étape : programmation / résultats / vérification / classement.";

    addTab("📅 Programmation", "programmation.html");
    addTab("🏁 Résultats", "resultats.html");
    addTab("🔎 Vérification", "verification.html");
    addTab("🏆 Classement", "classement.html");
  }

  function stopListeners(){
    if(unsubProg){ unsubProg(); unsubProg = null; }
    if(unsubRes){ unsubRes(); unsubRes = null; }
    if(unsubCls){ unsubCls(); unsubCls = null; }
    if(unsubIns){ unsubIns(); unsubIns = null; }
  }

  function progRef(scope){ return doc(db, "programmations", scope); }
  function resultsCol(scope){ return collection(db, `resultats_${scope}`); }
  function classementRef(scope){ return doc(db, "classements", scope); }
  function inscCol(scope){ return collection(db, `inscriptions_${scope}_private`); }

  function scoreNum(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  }

  function computeWinnerSideFromScore(res){
    if(!res) return null;
    if(res.winnerSide === "A" || res.winnerSide === "B") return res.winnerSide;

    let setsA = 0;
    let setsB = 0;

    const pairs = [
      [scoreNum(res.s1A), scoreNum(res.s1B)],
      [scoreNum(res.s2A), scoreNum(res.s2B)],
      [scoreNum(res.s3A), scoreNum(res.s3B)]
    ];

    for(const [a,b] of pairs){
      if(a === null || b === null) continue;
      if(a > b) setsA++;
      else if(b > a) setsB++;
    }

    if(setsA > setsB) return "A";
    if(setsB > setsA) return "B";
    return null;
  }

  function getPoolMatchIds(pool){
    return pool === "A" ? ["M1","M3","M5"] : ["M2","M4","M6"];
  }

  function getPoolTeamKeys(pool){
    return pool === "A" ? ["PA1","PA2","PA3"] : ["PB1","PB2","PB3"];
  }

  function computePoolRanking(pool){
    const teams = currentProg?.teams || {};
    const matches = currentProg?.matches || {};

    const teamKeys = getPoolTeamKeys(pool);
    const stats = new Map();

    for(const key of teamKeys){
      stats.set(key, {
        key,
        team: teams[key] || null,
        points: 0,
        setsWon: 0,
        setsLost: 0,
        gamesWon: 0,
        gamesLost: 0
      });
    }

    for(const mid of getPoolMatchIds(pool)){
      const m = matches[mid];
      if(!m) continue;

      const keyA = m.A?.key;
      const keyB = m.B?.key;
      if(!stats.has(keyA) || !stats.has(keyB)) continue;

      const res = resultsByMatch.get(mid);
      const winnerSide = computeWinnerSideFromScore(res);
      if(winnerSide !== "A" && winnerSide !== "B") continue;

      const A = stats.get(keyA);
      const B = stats.get(keyB);

      const sets = [
        [scoreNum(res.s1A), scoreNum(res.s1B)],
        [scoreNum(res.s2A), scoreNum(res.s2B)],
        [scoreNum(res.s3A), scoreNum(res.s3B)]
      ];

      let setsA = 0;
      let setsB = 0;

      for(const [ga, gb] of sets){
        if(ga === null || gb === null) continue;

        A.gamesWon += ga;
        A.gamesLost += gb;
        B.gamesWon += gb;
        B.gamesLost += ga;

        if(ga > gb) setsA++;
        else if(gb > ga) setsB++;
      }

      A.setsWon += setsA;
      A.setsLost += setsB;
      B.setsWon += setsB;
      B.setsLost += setsA;

      if(winnerSide === "A"){
        A.points += 2;
        B.points += 1;
      } else {
        B.points += 2;
        A.points += 1;
      }
    }

    return Array.from(stats.values()).sort((x,y)=>{
      if(y.points !== x.points) return y.points - x.points;

      const xSetsDiff = x.setsWon - x.setsLost;
      const ySetsDiff = y.setsWon - y.setsLost;
      if(ySetsDiff !== xSetsDiff) return ySetsDiff - xSetsDiff;

      const xGamesDiff = x.gamesWon - x.gamesLost;
      const yGamesDiff = y.gamesWon - y.gamesLost;
      if(yGamesDiff !== xGamesDiff) return yGamesDiff - xGamesDiff;

      const rx = Number(x.team?.teamRank ?? 999999);
      const ry = Number(y.team?.teamRank ?? 999999);
      return rx - ry;
    });
  }

  function resolveTeamRef(ref){
    if(!currentProg) return null;

    const teams = currentProg.teams || {};
    const matches = currentProg.matches || {};

    if(!ref) return null;

    if(ref.type === "team"){
      return teams[ref.key] || null;
    }

    if(ref.type === "poolRank"){
      const ranking = computePoolRanking(ref.pool);
      const row = ranking[Number(ref.rank) - 1];
      return row?.team || null;
    }

    if(ref.type === "winner" || ref.type === "loser"){
      const mid = ref.matchId;
      const m = matches[mid];
      if(!m) return null;

      const res = resultsByMatch.get(mid);
      const winnerSide = computeWinnerSideFromScore(res);
      if(winnerSide !== "A" && winnerSide !== "B") return null;

      const teamA = resolveTeamRef(m.A);
      const teamB = resolveTeamRef(m.B);

      const winner = (winnerSide === "A") ? teamA : teamB;
      const loser  = (winnerSide === "A") ? teamB : teamA;

      return ref.type === "winner" ? winner : loser;
    }

    return null;
  }

  function getWinnerTeam(matchId){
    const m = currentProg?.matches?.[matchId];
    if(!m) return null;

    const res = resultsByMatch.get(matchId);
    const winnerSide = computeWinnerSideFromScore(res);
    if(winnerSide !== "A" && winnerSide !== "B") return null;

    const teamA = resolveTeamRef(m.A);
    const teamB = resolveTeamRef(m.B);
    if(!teamA || !teamB) return null;

    return (winnerSide === "A") ? teamA : teamB;
  }

  function getLoserTeam(matchId){
    const m = currentProg?.matches?.[matchId];
    if(!m) return null;

    const res = resultsByMatch.get(matchId);
    const winnerSide = computeWinnerSideFromScore(res);
    if(winnerSide !== "A" && winnerSide !== "B") return null;

    const teamA = resolveTeamRef(m.A);
    const teamB = resolveTeamRef(m.B);
    if(!teamA || !teamB) return null;

    return (winnerSide === "A") ? teamB : teamA;
  }

  function buildTeamDetails(team){
    if(!team){
      return {
        teamName: "—",
        p1Display: "—",
        p2Display: "—",
        p1Licence: "—",
        p2Licence: "—"
      };
    }

    const teamName = team.teamName || "Équipe";
    const ins = getInscriptionForTeamName(teamName);

    const p1LastName = ins?.p1LastName || team.p1LastName || "";
    const p1FirstName = ins?.p1FirstName || team.p1FirstName || "";
    const p2LastName = ins?.p2LastName || team.p2LastName || "";
    const p2FirstName = ins?.p2FirstName || team.p2FirstName || "";

    const p1Display = `${p1LastName} ${p1FirstName}`.trim() || "—";
    const p2Display = `${p2LastName} ${p2FirstName}`.trim() || "—";

    return {
      teamName,
      p1Display,
      p2Display,
      p1Licence: ins?.p1Licence || team.p1Licence || "—",
      p2Licence: ins?.p2Licence || team.p2Licence || "—"
    };
  }

  function buildFinalRanking(){
    if(currentScope === "etape5"){
      const needed = ["M11","M16","M17","M18","M19"];
      const missing = [];

      for(const mid of needed){
        const r = resultsByMatch.get(mid);
        const winnerSide = computeWinnerSideFromScore(r);
        if(winnerSide !== "A" && winnerSide !== "B"){
          missing.push(mid);
        }
      }

      const positions = [
        { pos: 1,  from: () => getWinnerTeam("M19"), label:"🥇 1er" },
        { pos: 2,  from: () => getLoserTeam("M19"),  label:"🥈 2e"  },
        { pos: 3,  from: () => getWinnerTeam("M18"), label:"🥉 3e"  },
        { pos: 4,  from: () => getLoserTeam("M18"),  label:"4e"     },
        { pos: 5,  from: () => getWinnerTeam("M17"), label:"5e"     },
        { pos: 6,  from: () => getLoserTeam("M17"),  label:"6e"     },
        { pos: 7,  from: () => getWinnerTeam("M16"), label:"7e"     },
        { pos: 8,  from: () => getLoserTeam("M16"),  label:"8e"     },
        { pos: 9,  from: () => getWinnerTeam("M11"), label:"9e"     },
        { pos: 10, from: () => getLoserTeam("M11"),  label:"10e"    },
      ];

      const resolved = positions.map(x => ({ ...x, team: x.from() }));
      const unresolved = resolved.filter(x => !x.team).map(x => x.pos);
      const complete = (missing.length === 0 && unresolved.length === 0);

      return { complete, missing, unresolved, resolved };
    }

    const needed = ["M9","M10","M11","M12"];
    const missing = [];
    for(const mid of needed){
      const r = resultsByMatch.get(mid);
      const winnerSide = computeWinnerSideFromScore(r);
      if(winnerSide !== "A" && winnerSide !== "B"){
        missing.push(mid);
      }
    }

    const positions = [
      { pos: 1, from: () => getWinnerTeam("M12"), label:"🥇 1er" },
      { pos: 2, from: () => getLoserTeam("M12"),  label:"🥈 2e"  },
      { pos: 3, from: () => getWinnerTeam("M11"), label:"🥉 3e"  },
      { pos: 4, from: () => getLoserTeam("M11"),  label:"4e"     },
      { pos: 5, from: () => getWinnerTeam("M10"), label:"5e"     },
      { pos: 6, from: () => getLoserTeam("M10"),  label:"6e"     },
      { pos: 7, from: () => getWinnerTeam("M9"),  label:"7e"     },
      { pos: 8, from: () => getLoserTeam("M9"),   label:"8e"     },
    ];

    const resolved = positions.map(x => ({ ...x, team: x.from() }));
    const unresolved = resolved.filter(x => !x.team).map(x => x.pos);
    const complete = (missing.length === 0 && unresolved.length === 0);

    return { complete, missing, unresolved, resolved };
  }

  function render(){
    if(!currentProg){
      statusText.textContent = "⏳ Programmation non disponible (génère-la d’abord).";
      btnValidate.disabled = true;
      teamList.innerHTML = "";
      playerList.innerHTML = "";
      validatedBox.style.display = "none";
      return;
    }

    if(currentClassementDoc?.validatedAt){
      validatedBox.style.display = "block";
      validatedBox.innerHTML = `✅ Classement validé le <b>${esc(fmtDate(currentClassementDoc.validatedAt))}</b> par <b>${esc(currentClassementDoc.validatedBy || "—")}</b>.`;
    }else{
      validatedBox.style.display = "none";
      validatedBox.innerHTML = "";
    }

    const { complete, missing, unresolved, resolved } = buildFinalRanking();

    if(!complete){
      let msg = "⏳ Classement incomplet.";
      if(missing.length) msg += ` Match(s) manquant(s) : ${missing.join(", ")}.`;
      if(unresolved.length) msg += ` Équipe(s) non résolue(s) aux positions : ${unresolved.join(", ")}.`;
      statusText.textContent = msg;
    }else{
      statusText.textContent = "✅ Classement complet (prêt à valider).";
    }

    btnValidate.disabled = !(complete && !currentClassementDoc?.validatedAt);

    const teamCards = resolved.map(x=>{
      const t = buildTeamDetails(x.team);
      return `
        <div class="rank-card">
          <div class="rk">${esc(String(x.pos))}</div>
          <div class="rmain">
            <div class="rtitle">${esc(t.teamName)}</div>
            <div class="team-lines">
              <div class="team-line"><strong>Joueuse :</strong> ${esc(t.p1Display)} — <strong>Licence :</strong> ${esc(t.p1Licence)}</div>
              <div class="team-line"><strong>Joueur :</strong> ${esc(t.p2Display)} — <strong>Licence :</strong> ${esc(t.p2Licence)}</div>
            </div>
          </div>
          <div class="tag">${esc(x.label)}</div>
        </div>
      `;
    });

    teamList.innerHTML = teamCards.length
      ? `<div class="list">${teamCards.join("")}</div>`
      : `<p class="muted">—</p>`;

    const players = [];
    for(const x of resolved){
      const t = buildTeamDetails(x.team);
      const points = currentScope === "etape5"
        ? Number(ETAPE5_INDIVIDUAL_POINTS[x.pos] || 0)
        : 0;

      players.push({ pos:x.pos, name:t.p1Display, team:t.teamName, points });
      players.push({ pos:x.pos, name:t.p2Display, team:t.teamName, points });
    }

    const playerCards = players.map(p=>{
      return `
        <div class="rank-card">
          <div class="rk">${esc(String(p.pos))}</div>
          <div class="rmain">
            <div class="rtitle">${esc(p.name)}</div>
            <div class="rsub muted">${esc(p.team)}${currentScope === "etape5" ? ` — ${esc(String(p.points))} pts` : ""}</div>
          </div>
          <div class="tag">Position ${esc(String(p.pos))}</div>
        </div>
      `;
    });

    playerList.innerHTML = playerCards.length
      ? `<div class="list">${playerCards.join("")}</div>`
      : `<p class="muted">—</p>`;
  }

  function startProgListener(scope){
    if(unsubProg){ unsubProg(); unsubProg = null; }
    unsubProg = onSnapshot(progRef(scope), (snap)=>{
      currentProg = snap.exists() ? (snap.data() || {}) : null;
      render();
    }, (err)=>{
      console.error(err);
      statusText.textContent = "🔴 Erreur programmation.";
    });
  }

  function startResultsListener(scope){
    if(unsubRes){ unsubRes(); unsubRes = null; }
    unsubRes = onSnapshot(resultsCol(scope), (snap)=>{
      resultsByMatch = new Map();
      snap.forEach(d=> resultsByMatch.set(d.id, d.data() || {}));
      render();
    });
  }

  function startClassementListener(scope){
    if(unsubCls){ unsubCls(); unsubCls = null; }
    unsubCls = onSnapshot(classementRef(scope), (snap)=>{
      currentClassementDoc = snap.exists() ? (snap.data() || {}) : null;
      render();
    });
  }

  function startInscriptionsListener(scope){
    if(unsubIns){ unsubIns(); unsubIns = null; }
    unsubIns = onSnapshot(inscCol(scope), (snap)=>{
      inscriptions = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      inscriptionsByTeamName = new Map();

      for(const ins of inscriptions){
        const key = normalizeTeamName(ins.teamName);
        if(key) inscriptionsByTeamName.set(key, ins);
      }

      render();
    }, (err)=>{
      console.error(err);
      render();
    });
  }

  async function validateClassement(){
    const { complete, resolved } = buildFinalRanking();
    if(!complete){
      alert("Classement incomplet ❌");
      return;
    }

    const userEmail = auth.currentUser?.email || null;

    const positions = resolved.map(x=>{
      const t = x.team;
      const ins = getInscriptionForTeamName(t?.teamName || "");
      return {
        pos: x.pos,
        teamName: t?.teamName || null,
        p1FirstName: ins?.p1FirstName || t?.p1FirstName || null,
        p1LastName:  ins?.p1LastName  || t?.p1LastName  || null,
        p1Licence:   ins?.p1Licence   || t?.p1Licence   || null,
        p2FirstName: ins?.p2FirstName || t?.p2FirstName || null,
        p2LastName:  ins?.p2LastName  || t?.p2LastName  || null,
        p2Licence:   ins?.p2Licence   || t?.p2Licence   || null,
      };
    });

    const players = [];
    for(const p of positions){
      const points = currentScope === "etape5"
        ? Number(ETAPE5_INDIVIDUAL_POINTS[p.pos] || 0)
        : 0;

      players.push({
        pos: p.pos,
        lastName: p.p1LastName,
        firstName: p.p1FirstName,
        licence: p.p1Licence,
        teamName: p.teamName,
        points
      });

      players.push({
        pos: p.pos,
        lastName: p.p2LastName,
        firstName: p.p2FirstName,
        licence: p.p2Licence,
        teamName: p.teamName,
        points
      });
    }

    const payload = {
      scope: currentScope,
      computedAt: serverTimestamp(),
      computedFrom: {
        matches: currentScope === "etape5"
          ? ["M11","M16","M17","M18","M19"]
          : ["M9","M10","M11","M12"]
      },
      positions,
      players,
      validatedAt: serverTimestamp(),
      validatedBy: userEmail
    };

    await setDoc(classementRef(currentScope), payload, { merge:true });
  }

  function showPanelsForScope(scope){
    pageSub.textContent =
      scope === "general"
        ? "Général"
        : `${stepLabel(scope)} — ${scope === "etape5" ? "BT500" : "BT250"}`;

    if(scope === "general"){
      panelNeedStep.style.display = "block";
      panelRank.style.display = "none";
      stopListeners();
      return;
    }

    helpText.innerHTML = scope === "etape5"
      ? `Le classement est calculé à partir des matchs :
         <b>M11</b> (9e/10e), <b>M16</b> (7e/8e), <b>M17</b> (5e/6e),
         <b>M18</b> (3e/4e), <b>M19</b> (Finale).`
      : `Le classement est calculé à partir des matchs :
         <b>M9</b> (7e/8e), <b>M10</b> (5e/6e), <b>M11</b> (3e/4e), <b>M12</b> (Finale).`;

    panelNeedStep.style.display = "none";
    panelRank.style.display = "block";

    startProgListener(scope);
    startResultsListener(scope);
    startClassementListener(scope);
    startInscriptionsListener(scope);
  }

  function showDenied(){
    accessDenied.style.display = "block";
    adminUI.style.display = "none";
    panelNeedStep.style.display = "none";
    panelRank.style.display = "none";
    stopListeners();
  }

  function showAdmin(){
    accessDenied.style.display = "none";
    adminUI.style.display = "block";

    scopeEl.value = currentScope;
    setTabs(currentScope);
    showPanelsForScope(currentScope);

    scopeEl.onchange = ()=>{
      currentScope = scopeEl.value || "general";
      setTabs(currentScope);
      showPanelsForScope(currentScope);
    };
  }

  btnValidate.onclick = async (e)=>{
    e.preventDefault();
    if(btnValidate.disabled) return;

    const ok = confirm("Valider le classement final ?\n\n⚠️ Action enregistrée en base.");
    if(!ok) return;

    btnValidate.disabled = true;
    try{
      await validateClassement();
      alert("✅ Classement validé !");
    }catch(err){
      console.error(err);
      alert("Erreur Firestore ❌");
    }finally{
      render();
    }
  };

  document.getElementById("btnLogout").onclick = async (e)=>{
    e.preventDefault();
    await logout();
    window.location.href = "../index.html";
  };

  const g = await requireRole(["admin","jat"]);
  if(!g.ok){ showDenied(); }
  else { showAdmin(); }

  onAuthStateChanged(auth, async (user)=>{
    if(!user){ showDenied(); return; }
    const g2 = await requireRole(["admin","jat"]);
    if(!g2.ok){ showDenied(); return; }
  });
</script>

</body>
</html>
