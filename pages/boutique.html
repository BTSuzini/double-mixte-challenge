
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Boutique — Open BT Bricorama</title>

<link rel="stylesheet" href="../assets/css/main.css?v=20260406-open-boutique-v1"/>

<style>
/* ===== SUBTABS ===== */
.subtabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.subtab{
  border:1px solid #ddd;
  background:#fafafa;
  border-radius:999px;
  padding:10px;
  font-weight:900;
  cursor:pointer;
}
.subtab[aria-selected="true"]{
  background:#fff;
  box-shadow:0 6px 14px rgba(0,0,0,.06);
}

/* ===== CARDS ===== */
.pay-list{
  display:grid;
  gap:10px;
  margin-top:12px;
}

.pay-card{
  border-radius:16px;
  background:#fff;
  padding:12px;
  box-shadow:0 6px 16px rgba(0,0,0,.05);
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
}
.dot.red{background:#e74c3c;}
.dot.orange{background:#f39c12;}
.dot.green{background:#2ecc71;}
</style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">

    <div class="header-logo left">
      <img src="../assets/img/blason-suzini.png">
    </div>

    <div class="header-logo center">
      <img src="../assets/img/openbt.png">
    </div>

    <div class="header-logo right">
      <img src="../assets/img/BT500.png">
    </div>

    <nav class="header-nav">
      <a class="nav-link" href="../index.html">🏠 Accueil</a>
      <a class="nav-link" href="equipes.html">👥 Équipes</a>
      <a class="nav-link" href="programmation.html">📅 Programmation</a>
      <a class="nav-link" href="classements.html">🏆 Résultats</a>
      <a class="nav-link" href="reglement.html">📘 Règlement</a>
      <a class="nav-link" href="inscriptions.html">📝 Inscriptions</a>
      <a class="nav-link primary" href="boutique.html">🛍️ Boutique</a>
      <a class="nav-link" href="repas.html">🍽️ Repas</a>
      <a class="nav-link" href="tirage.html">🎲 Tirage</a>
      <a class="nav-link" href="infos.html">ℹ️ Infos</a>
      <a class="nav-link" href="contact.html">📩 Contact</a>
    </nav>

  </div>
</header>

<main class="container">

<section class="panel">
<h2>🛒 Boutique / Paiement</h2>

<div class="subtabs">
<button id="tabShop" class="subtab" aria-selected="true">🛍️ Boutique</button>
<button id="tabPaid" class="subtab">✅ Paiements</button>
</div>

</section>

<!-- ===== BOUTIQUE ===== -->
<section id="panelShop" class="panel">

<p>
Paiement via <b>SumUp</b>
</p>

<a class="btn btn-primary"
href="https://tennis-club-de-suzini.sumupstore.com"
target="_blank">
🔗 Ouvrir la boutique
</a>

</section>

<!-- ===== PAIEMENTS ===== -->
<section id="panelPaid" class="panel" style="display:none;">

<h2>✅ Paiements</h2>

<div class="subtabs" style="margin-top:10px;">
<button id="btnDH" class="subtab" aria-selected="true">👨 DH</button>
<button id="btnDD" class="subtab">👩 DD</button>
</div>

<p id="status" class="muted">Chargement…</p>

<div id="list" class="pay-list"></div>

</section>

</main>

<script type="module">
import { db } from "../assets/js/firebase.js";
import {
collection,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const COL = {
DH:"equipes_dh_public",
DD:"equipes_dd_public"
};

let current="DH";

const tabShop=document.getElementById("tabShop");
const tabPaid=document.getElementById("tabPaid");
const panelShop=document.getElementById("panelShop");
const panelPaid=document.getElementById("panelPaid");

tabShop.onclick=()=>{
panelShop.style.display="block";
panelPaid.style.display="none";
};

tabPaid.onclick=()=>{
panelShop.style.display="none";
panelPaid.style.display="block";
load();
};

document.getElementById("btnDH").onclick=()=>{
current="DH";
load();
};

document.getElementById("btnDD").onclick=()=>{
current="DD";
load();
};

function load(){
const list=document.getElementById("list");
const status=document.getElementById("status");

status.textContent="Chargement…";

const q=query(collection(db,COL[current]),orderBy("createdAt","asc"));

onSnapshot(q,(snap)=>{
const arr=[];

snap.forEach(d=>{
const x=d.data();
arr.push({
team:x.teamName,
p1:x.p1FirstName,
p2:x.p2FirstName
});
});

status.textContent="🟢 En direct";

list.innerHTML=arr.map(t=>`
<div class="pay-card">
<b>${t.team}</b><br>
${t.p1} / ${t.p2}
</div>
`).join("");

});
}
</script>

</body>
</html>
