<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classement — Double Mixte Challenge</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=20260316-classement-public-v8" />
  <style>
    .list{ display:flex; flex-direction:column; gap:10px; }

    .rank-card{
      border-radius:16px;
      border:2px solid rgba(0,0,0,.06);
      padding:12px;
      background:#fff;
      box-shadow:0 1px 0 rgba(0,0,0,.03);
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }

    .rk{
      width:42px; height:42px; border-radius:14px;
      border:1px solid rgba(0,0,0,.10);
      display:flex; align-items:center; justify-content:center;
      font-weight:1000; font-size:16px; flex:0 0 auto;
      font-variant-numeric: tabular-nums;
      position:relative;
      z-index:2;
    }

    .rmain{ min-width:0; flex:1 1 auto; position:relative; z-index:2; }
    .rtitle{
      font-weight:1000; line-height:1.15; margin:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .rsub{
      margin-top:6px;
      font-size:12px;
      opacity:.85;
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tag{
      border:1px solid rgba(0,0,0,.12);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
      opacity:.95;
      flex:0 0 auto;
      font-variant-numeric: tabular-nums;
      position:relative;
      z-index:2;
    }

    .rank-card.one-line{ align-items:center; }
    .one-line .rsub{ display:none; }

    .meta-line{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      position:relative;
      z-index:2;
    }
    .meta-pill{
      border:1px solid rgba(0,0,0,.12);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
      opacity:.95;
      font-variant-numeric: tabular-nums;
    }

    .mid-logo{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      height:100%;
      width:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:1;
      opacity:1;
    }
    .mid-logo img{
      height:100%;
      width:auto;
      object-fit:contain;
      display:block;
      padding:6px;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,.08));
    }

    @media (max-width: 420px){
      .rk{ width:38px; height:38px; border-radius:12px; }
      .meta-pill, .tag{ font-size:11px; padding:6px 9px; }
      .mid-logo img{ padding:5px; }
    }

    @media (max-width: 520px){
      .rank-card{
        flex-direction:column;
        align-items:flex-start;
        justify-content:flex-start;
        gap:10px;
        padding-right:72px;
      }

      .rtitle, .rsub{
        white-space:normal;
        overflow:visible;
        text-overflow:unset;
      }

      .meta-line{
        justify-content:flex-start;
        width:100%;
        gap:8px;
      }

      .tag{
        position:absolute;
        top:10px;
        right:10px;
      }

      .mid-logo{
        left:auto;
        right:10px;
        top:50%;
        transform:translateY(-50%);
        height:62%;
        opacity:.86;
      }
      .mid-logo img{
        height:100%;
        padding:0;
        filter: none;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="container">
    <div class="topbar-row">
      <div class="brand-logo">
        <img src="../assets/img/logo-suzini.png" alt="Logo Suzini">
      </div>

      <div class="brand-title" style="display:flex;align-items:center;justify-content:center;">
        <img src="../assets/img/challenge-gen.png">
      </div>

      <div class="brand-logo">
        <img src="../assets/img/logo-challenge.png">
      </div>
    </div>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Classement général</h2>
    <div id="rankBox"></div>
  </section>
</main>

<script type="module">
import { db } from "../assets/js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const STEP_IDS = ["etape1","etape2","etape3","etape4","etape5"];
const classements = new Map();
let generalConfig = { players:{} };

const POINTS_BT100 = {1:100,2:75,3:65,4:55,5:47,6:45,7:40,8:35};
const POINTS_BT250 = {1:250,2:175,3:140,4:105,5:88,6:76,7:65,8:52};

function pointsTable(stepId){
  return (stepId==="etape1"||stepId==="etape5") ? POINTS_BT250 : POINTS_BT100;
}

function normalizeText(s){
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function canonicalPlayerKey(firstName){
  return normalizeText(firstName);
}

function displayName(first,last){
  if(!last) return first;
  return first+" "+last[0].toUpperCase()+".";
}

/* ✅ NOUVEAU : récupération badge compatible ancien système */
function getPlayerConfig(firstName,lastName){
  const players = generalConfig.players || {};
  const keyNew = normalizeText(firstName);

  if(players[keyNew]) return players[keyNew];

  const keyOld = normalizeText(firstName)+"|"+normalizeText(lastName);
  if(players[keyOld]) return players[keyOld];

  // fallback : recherche par prénom
  for(const k in players){
    if(k.startsWith(keyNew)) return players[k];
  }

  return {};
}

function buildGeneral(){
  const map = new Map();

  for(const stepId of STEP_IDS){
    const doc = classements.get(stepId);
    if(!doc || !doc.positions) continue;

    for(const row of doc.positions){
      const pts = pointsTable(stepId)[row.pos]||0;

      for(const p of [
        {f:row.p1FirstName,l:row.p1LastName},
        {f:row.p2FirstName,l:row.p2LastName}
      ]){
        const key = canonicalPlayerKey(p.f);
        if(!key) continue;

        if(!map.has(key)){
          map.set(key,{
            first:p.f,
            last:p.l,
            name: displayName(p.f,p.l),
            points:0
          });
        }

        const rec = map.get(key);

        const newName = displayName(p.f,p.l);
        if(newName.length > rec.name.length){
          rec.name = newName;
          rec.last = p.l;
        }

        rec.points += pts;
      }
    }
  }

  return [...map.values()]
    .map(p=>{
      const cfg = getPlayerConfig(p.first,p.last);
      return {
        ...p,
        badge: cfg.badge || null
      };
    })
    .sort((a,b)=>b.points-a.points);
}

function render(){
  const rows = buildGeneral();

  document.getElementById("rankBox").innerHTML =
    rows.map((r,i)=>`
      <div class="rank-card">
        ${r.badge ? `<div class="mid-logo"><img src="../assets/img/badges/${r.badge}"></div>` : ""}
        <div class="rk">${i+1}</div>
        <div class="rmain">
          <div class="rtitle">${r.name}</div>
        </div>
        <div class="meta-pill">${r.points} pts</div>
      </div>
    `).join("");
}

onSnapshot(doc(db,"config","classement_general"),snap=>{
  generalConfig = snap.data()||{players:{}};
  render();
});

for(const s of STEP_IDS){
  onSnapshot(doc(db,"classements",s),(snap)=>{
    classements.set(s,snap.data());
    render();
  });
}
</script>

</body>
</html>
