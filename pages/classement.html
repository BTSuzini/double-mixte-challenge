<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Classement — Double Mixte Challenge</title>

<link rel="stylesheet" href="../assets/css/main.css?v=20260301-classement-public-v5"/>

<style>
.list{display:flex;flex-direction:column;gap:10px}

.rank-card{
border-radius:16px;
border:2px solid rgba(0,0,0,.06);
padding:12px;
background:#fff;
display:flex;
gap:12px;
align-items:center;
justify-content:space-between;
}

.rk{
width:42px;height:42px;
border-radius:14px;
border:1px solid rgba(0,0,0,.1);
display:flex;
align-items:center;
justify-content:center;
font-weight:1000;
}

.rmain{flex:1}
.rtitle{font-weight:1000}
.rsub{font-size:12px;opacity:.8;margin-top:4px}

.meta-line{display:flex;gap:8px}
.meta-pill{
border:1px solid rgba(0,0,0,.12);
border-radius:999px;
padding:6px 10px;
font-size:12px;
font-weight:900;
}
</style>
</head>

<body>

<main class="container">

<section class="card">
<h2>Choisir un classement</h2>

<select id="rankScope">
<option value="general">Classement général</option>
<option value="etape1">Classement — Étape 1 (BT250)</option>
<option value="etape2" disabled>Étape 2</option>
<option value="etape3" disabled>Étape 3</option>
<option value="etape4" disabled>Étape 4</option>
<option value="etape5" disabled>Étape 5</option>
</select>

<p id="rankHint" class="muted">Chargement…</p>
</section>

<section class="card">
<h2 id="rankTitle">Classement</h2>
<p id="rankSub" class="muted"></p>
<div id="rankBox"></div>
</section>

</main>

<script type="module">

import { db } from "../assets/js/firebase.js";
import { doc,onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ===========================
POINTS FFT
=========================== */

const POINTS_BT100={1:100,2:75,3:65,4:55,5:47,6:45,7:40,8:35};
const POINTS_BT250={1:250,2:175,3:140,4:105,5:88,6:76,7:65,8:52};

const STEP_IDS=["etape1","etape2","etape3","etape4","etape5"];

const classements=new Map();

/* ===========================
UTILS
=========================== */

const esc=s=>(s??"").toString()
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;");

function stepType(id){
return(id==="etape1"||id==="etape5")
?"BT250":"BT100";
}

function ptsTable(id){
return stepType(id)==="BT250"
?POINTS_BT250
:POINTS_BT100;
}

function playerDisplay(fn,ln){
if(!fn&&!ln)return"—";
return ln?`${fn} ${ln[0]}.`:fn;
}

/* ===========================
🔥 NORMALISATION ADMIN
(players[])
=========================== */

function normalizeStepTeams(stepId,docData){

if(!docData?.players)return[];

const table=ptsTable(stepId);
const map=new Map();

/* group players -> team */
for(const p of docData.players){

const pos=Number(p.pos);
if(!pos)continue;

const team=p.teamName||"Équipe";
const key=pos+"_"+team;

if(!map.has(key))
map.set(key,{pos,team,players:[]});

map.get(key).players.push(p);
}

return [...map.values()]
.map(g=>{

const a=g.players[0]||{};
const b=g.players[1]||{};

return{
pos:g.pos,
points:table[g.pos]||0,
team:{
teamName:g.team,
p1FirstName:a.firstName,
p1LastName:a.lastName,
p2FirstName:b.firstName,
p2LastName:b.lastName
}
};
})
.sort((a,b)=>a.pos-b.pos);
}

/* ===========================
GENERAL
=========================== */

function buildGeneral(){

const players=new Map();

for(const step of STEP_IDS){

const doc=classements.get(step);
if(!doc)continue;

for(const row of normalizeStepTeams(step,doc)){

const pts=row.points;

[
playerDisplay(row.team.p1FirstName,row.team.p1LastName),
playerDisplay(row.team.p2FirstName,row.team.p2LastName)
]
.forEach(name=>{

if(name==="—")return;

if(!players.has(name))
players.set(name,{name,pts:0,steps:new Set()});

players.get(name).pts+=pts;
players.get(name).steps.add(step);

});
}
}

return [...players.values()]
.map(p=>({
name:p.name,
points:p.pts,
steps:p.steps.size
}))
.sort((a,b)=>b.points-a.points);
}

/* ===========================
RENDER
=========================== */

const sel=document.getElementById("rankScope");
const title=document.getElementById("rankTitle");
const sub=document.getElementById("rankSub");
const hint=document.getElementById("rankHint");
const box=document.getElementById("rankBox");

function renderGeneral(){

title.textContent="Classement général";

const rows=buildGeneral();

if(!rows.length){
box.innerHTML="Aucun classement.";
return;
}

box.innerHTML=
rows.map((r,i)=>`
<div class="rank-card">
<div class="rk">${i+1}</div>
<div>${esc(r.name)}</div>
<div class="meta-line">
<span class="meta-pill">${r.points} pts</span>
<span class="meta-pill">${r.steps} étape(s)</span>
</div>
</div>`).join("");
}

function renderStep(step){

const d=classements.get(step);

title.textContent=`Classement ${step}`;

if(!d){
box.innerHTML="Classement non publié.";
return;
}

const rows=normalizeStepTeams(step,d);

box.innerHTML=
rows.map(r=>`
<div class="rank-card">
<div class="rk">${r.pos}</div>
<div class="rmain">
<div class="rtitle">
${esc(r.team.teamName)} — ${r.points} pts
</div>
<div class="rsub">
${playerDisplay(r.team.p1FirstName,r.team.p1LastName)}
/
${playerDisplay(r.team.p2FirstName,r.team.p2LastName)}
</div>
</div>
</div>`).join("");
}

function render(){
sel.value==="general"
?renderGeneral()
:renderStep(sel.value);
}

/* ===========================
LISTEN FIRESTORE
=========================== */

function listen(id){

onSnapshot(doc(db,"classements",id),
snap=>{
classements.set(id,
snap.exists()?snap.data():null);
render();
hint.textContent="🟢 En direct";
});
}

listen("general");
STEP_IDS.forEach(listen);

sel.onchange=render;

</script>

</body>
</html>
