<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classement — Double Mixte Challenge</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=20260410-classement-public-v9" />
  <style>
    .list{ display:flex; flex-direction:column; gap:10px; }

    .rank-card{
      border-radius:16px;
      border:2px solid rgba(0,0,0,.06);
      padding:12px;
      background:#fff;
      box-shadow:0 1px 0 rgba(0,0,0,.03);
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }

    .rk{
      width:42px; height:42px; border-radius:14px;
      border:1px solid rgba(0,0,0,.10);
      display:flex; align-items:center; justify-content:center;
      font-weight:1000; font-size:16px; flex:0 0 auto;
      font-variant-numeric: tabular-nums;
      position:relative;
      z-index:2;
    }

    .rmain{ min-width:0; flex:1 1 auto; position:relative; z-index:2; }
    .rtitle{
      font-weight:1000; line-height:1.15; margin:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .rsub{
      margin-top:6px;
      font-size:12px;
      opacity:.85;
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tag{
      border:1px solid rgba(0,0,0,.12);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
      opacity:.95;
      flex:0 0 auto;
      font-variant-numeric: tabular-nums;
      position:relative;
      z-index:2;
    }

    .rank-card.one-line{ align-items:center; }
    .one-line .rsub{ display:none; }

    .meta-line{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      position:relative;
      z-index:2;
    }
    .meta-pill{
      border:1px solid rgba(0,0,0,.12);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:1000;
      white-space:nowrap;
      opacity:.95;
      font-variant-numeric: tabular-nums;
    }

    /* Logo / badge en filigrane */
    .mid-logo{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      height:100%;
      width:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:1;
      opacity:1;
    }
    .mid-logo img{
      height:100%;
      width:auto;
      object-fit:contain;
      display:block;
      padding:6px;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,.08));
    }

    @media (max-width: 420px){
      .rk{ width:38px; height:38px; border-radius:12px; }
      .meta-pill, .tag{ font-size:11px; padding:6px 9px; }
      .mid-logo img{ padding:5px; }
    }

    @media (max-width: 520px){
      .rank-card{
        flex-direction:column;
        align-items:flex-start;
        justify-content:flex-start;
        gap:10px;
        padding-right:72px;
      }

      .rtitle, .rsub{
        white-space:normal;
        overflow:visible;
        text-overflow:unset;
      }
      .rsub{
        margin-top:6px;
      }

      .meta-line{
        justify-content:flex-start;
        width:100%;
        gap:8px;
      }

      .tag{
        position:absolute;
        top:10px;
        right:10px;
      }

      .mid-logo{
        left:auto;
        right:10px;
        top:50%;
        transform:translateY(-50%);
        height:62%;
        opacity:.86;
      }
      .mid-logo img{
        height:100%;
        padding:0;
        filter:none;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="container">
    <div class="topbar-row">
      <div class="brand-logo">
        <img src="../assets/img/logo-suzini.png" alt="Logo Suzini">
      </div>

      <div class="brand-title" style="display:flex;align-items:center;justify-content:center;">
        <img src="../assets/img/challenge-gen.png"
             alt="Suzini Beach Tennis Double Mixte Challenge"
             style="width:min(560px, 100%);max-height:90px;height:auto;object-fit:contain;display:block;filter:drop-shadow(0 1px 0 rgba(0,0,0,.15));">
      </div>

      <div class="brand-logo">
        <img src="../assets/img/logo-challenge.png" alt="Logo Challenge">
      </div>
    </div>

    <nav class="nav">
      <a href="../index.html" aria-label="Accueil">🏠</a>
      <a href="reglement.html">📘 Règlement</a>
      <a href="classement.html" aria-current="page">🏆 Classement</a>
      <a href="boutique.html">🛍️ Boutique</a>
      <a href="infos.html">📰 Infos</a>
      <a href="contact.html" aria-label="Contact">📩 📞</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="card">
    <h2 style="margin:0 0 8px;">Choisir un classement</h2>

    <div class="field">
      <label for="rankScope">Affichage</label>
      <select id="rankScope">
        <option value="general" selected>Classement général</option>
        <option value="etape1">Classement — Étape 1 (BT250)</option>
        <option value="etape2" disabled>Classement — Étape 2 (BT100) (à venir)</option>
        <option value="etape3" disabled>Classement — Étape 3 (BT100) (à venir)</option>
        <option value="etape4" disabled>Classement — Étape 4 (BT250) (à venir)</option>
        <option value="etape5" disabled>Classement — Étape 5 (BT500) (à venir)</option>
      </select>
    </div>

    <p class="muted" id="rankHint" style="margin:10px 0 0;">Chargement…</p>
  </section>

  <section class="card">
    <h2 id="rankTitle" style="margin:0 0 6px;">Classement général</h2>
    <p class="muted" id="rankSub" style="margin:0;">—</p>
    <div id="rankBox" style="margin-top:12px;"></div>
  </section>

</main>

<script type="module">
  import { db } from "../assets/js/firebase.js";
  import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const POINTS_BT100 = { 1:100, 2:75, 3:65, 4:55, 5:47, 6:45, 7:40, 8:35 };
  const POINTS_BT250 = { 1:250, 2:175, 3:140, 4:105, 5:88,  6:76, 7:65, 8:52 };
  const POINTS_BT500 = {
    1:350, 2:245, 3:189, 4:147, 5:123, 6:105,
    7:91, 8:74, 9:67, 10:61, 11:57, 12:53
  };

  const STEP_IDS = ["etape1","etape2","etape3","etape4","etape5"];

  function stepType(stepId){
    if(stepId === "etape1" || stepId === "etape4") return "BT250";
    if(stepId === "etape5") return "BT500";
    return "BT100";
  }

  function pointsTable(stepId){
    const type = stepType(stepId);
    if(type === "BT500") return POINTS_BT500;
    if(type === "BT250") return POINTS_BT250;
    return POINTS_BT100;
  }

  const sel   = document.getElementById("rankScope");
  const title = document.getElementById("rankTitle");
  const sub   = document.getElementById("rankSub");
  const hint  = document.getElementById("rankHint");
  const box   = document.getElementById("rankBox");

  const classements = new Map();
  classements.set("general", null);
  for(const s of STEP_IDS) classements.set(s, null);

  let generalConfig = { players:{}, order:[] };
  let hasAnyListenerOk = false;

  function esc(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function stepLabel(stepId){
    const n = String(stepId || "").replace("etape","");
    if(!n || n === stepId) return stepId;
    return `Étape ${n}`;
  }

  function nameInitial(lastName){
    const s = (lastName || "").toString().trim();
    if(!s) return "";
    return s[0].toUpperCase() + ".";
  }

  const PLAYER_FIRSTNAME_ALIASES = {
    "charlyne": "charline"
  };

  function normalizeTextBasic(s){
    return (s || "")
      .toString()
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, " ");
  }

  function canonicalFirstName(firstName){
    const raw = normalizeTextBasic(firstName);
    if(!raw) return "";
    return PLAYER_FIRSTNAME_ALIASES[raw] || raw;
  }

  function canonicalLastName(lastName){
    return normalizeTextBasic(lastName);
  }

  // Fusion volontaire par prénom uniquement
  function canonicalPlayerKey(firstName, lastName){
    const fn = canonicalFirstName(firstName);
    if(!fn) return "";
    return fn;
  }

  function playerDisplay(firstName, lastName){
    const fn = (firstName || "").toString().trim();
    const ini = nameInitial(lastName);
    if(!fn && !ini) return "—";
    if(!ini) return fn || "—";
    return `${fn} ${ini}`.trim();
  }

  function teamNameOf(team){
    return (team?.teamName || team?.name || "Équipe").toString().trim() || "Équipe";
  }

  function teamPlayersLine(team){
    const p1 = playerDisplay(team?.p1FirstName, team?.p1LastName);
    const p2 = playerDisplay(team?.p2FirstName, team?.p2LastName);
    return `${p1}/${p2}`;
  }

  function makeEmpty(msg){
    return `<p class="muted" style="margin:0;">${esc(msg)}</p>`;
  }

  function normTeamName(s){
    return (s || "").toString().trim().toLowerCase()
      .replaceAll("’","'")
      .replace(/\s+/g," ");
  }

  function teamLogoFromDoc(stepDoc, teamName){
    if(!stepDoc) return null;
    const map = stepDoc.teamLogos || stepDoc.logos || null;
    if(map && typeof map === "object"){
      if(map[teamName]) return map[teamName];
      const tn = normTeamName(teamName);
      for(const k of Object.keys(map)){
        if(normTeamName(k) === tn) return map[k];
      }
    }
    return null;
  }

  function teamLogoSrc(stepId, stepDoc, team){
    const teamName = teamNameOf(team);

    const file = team?.logoFile || team?.logo || team?.logoUrl || team?.teamLogo || null;
    if(file){
      if(String(file).startsWith("http://") || String(file).startsWith("https://")) return String(file);
      return `../assets/img/${String(file)}`;
    }

    const fromMap = teamLogoFromDoc(stepDoc, teamName);
    if(fromMap){
      if(String(fromMap).startsWith("http://") || String(fromMap).startsWith("https://")) return String(fromMap);
      return `../assets/img/${String(fromMap)}`;
    }

    if(stepId === "etape1" && normTeamName(teamName) === "les lobstars"){
      return "../assets/img/lobstars.png";
    }

    return null;
  }

  function renderMidLogo(src, alt){
    if(!src) return "";
    return `<div class="mid-logo" aria-hidden="true"><img src="${esc(src)}" alt="${esc(alt || "Logo")}"></div>`;
  }

  function badgeToSrc(file){
    if(!file) return "";
    if(String(file).startsWith("http://") || String(file).startsWith("https://")) return String(file);
    return `../assets/img/badges/${String(file)}`;
  }

  function getPlayerConfig(firstName, lastName){
    const players = generalConfig?.players || {};

    const keyNew = canonicalPlayerKey(firstName, lastName);
    if(keyNew && players[keyNew]) return players[keyNew];

    const keyOld = `${canonicalFirstName(firstName)}|${canonicalLastName(lastName)}`;
    if(players[keyOld]) return players[keyOld];

    for(const k of Object.keys(players)){
      if(k === keyNew) return players[k];
      if(k.startsWith(`${canonicalFirstName(firstName)}|`)) return players[k];
    }

    return {};
  }

  function renderGeneralVisual(row){
    const badgeSrc = row?.badge ? badgeToSrc(row.badge) : "";
    if(badgeSrc){
      return renderMidLogo(badgeSrc, `Badge — ${row.name}`);
    }
    if(row?.logo){
      return renderMidLogo(row.logo, `Logo — ${row.name}`);
    }
    return "";
  }

  function genderRank(g){
    const s = (g ?? "").toString().toUpperCase().trim();
    if(s === "F" || s === "FEMALE" || s === "W") return 0;
    if(s === "M" || s === "MALE") return 2;
    return 1;
  }

  function inferGenderFromPlayerObj(p){
    if(!p || typeof p !== "object") return null;
    if("gender" in p) return p.gender;
    if("sex" in p) return p.sex;
    if("isFemale" in p) return (p.isFemale === true ? "F" : (p.isFemale === false ? "M" : null));
    return null;
  }

  function normalizeStepTeams(stepId, stepDoc){
    const ptsTable = pointsTable(stepId);

    const positions = Array.isArray(stepDoc?.positions) ? stepDoc.positions : null;
    if(positions && positions.length){
      return positions
        .map(r=>{
          const pos = Number(r?.pos);
          if(!Number.isFinite(pos)) return null;

          const team = {
            teamName: r?.teamName || r?.team?.teamName || "Équipe",
            p1FirstName: r?.p1FirstName || r?.team?.p1FirstName || "",
            p1LastName:  r?.p1LastName  || r?.team?.p1LastName  || "",
            p2FirstName: r?.p2FirstName || r?.team?.p2FirstName || "",
            p2LastName:  r?.p2LastName  || r?.team?.p2LastName  || "",
            logoFile: r?.logoFile || r?.logo || r?.logoUrl || r?.team?.logoFile || r?.team?.logo || r?.team?.logoUrl || null
          };

          const pts = Number(ptsTable[pos] || 0);
          return { pos, team, points: pts };
        })
        .filter(Boolean)
        .sort((a,b)=>a.pos-b.pos);
    }

    const legacy = Array.isArray(stepDoc?.teams) ? stepDoc.teams
                 : (Array.isArray(stepDoc?.ranking) ? stepDoc.ranking : null);

    if(legacy && legacy.length){
      return legacy
        .map(r=>{
          const pos = Number(r?.pos);
          if(!Number.isFinite(pos)) return null;

          const team = {
            teamName: r?.teamName || r?.team?.teamName || "Équipe",
            p1FirstName: r?.p1FirstName || r?.team?.p1FirstName || "",
            p1LastName:  r?.p1LastName  || r?.team?.p1LastName  || "",
            p2FirstName: r?.p2FirstName || r?.team?.p2FirstName || "",
            p2LastName:  r?.p2LastName  || r?.team?.p2LastName  || "",
            logoFile: r?.logoFile || r?.logo || r?.logoUrl || r?.team?.logoFile || r?.team?.logo || r?.team?.logoUrl || null
          };

          const pts = Number(ptsTable[pos] || 0);
          return { pos, team, points: pts };
        })
        .filter(Boolean)
        .sort((a,b)=>a.pos-b.pos);
    }

    const players = Array.isArray(stepDoc?.players) ? stepDoc.players : [];
    if(players.length){
      const groups = new Map();
      for(const p of players){
        const pos = Number(p?.pos);
        if(!Number.isFinite(pos)) continue;
        const tname = (p?.teamName || "Équipe").toString().trim() || "Équipe";
        const key = `${pos}||${tname}`;
        if(!groups.has(key)) groups.set(key, { pos, teamName: tname, players: [] });
        groups.get(key).players.push(p);
      }

      const rows = [];
      for(const g of groups.values()){
        const a = g.players[0] || {};
        const b = g.players[1] || {};
        const team = {
          teamName: g.teamName,
          p1FirstName: (a.firstName ?? a.p1FirstName ?? "").toString(),
          p1LastName:  (a.lastName  ?? a.p1LastName  ?? "").toString(),
          p2FirstName: (b.firstName ?? b.p2FirstName ?? "").toString(),
          p2LastName:  (b.lastName  ?? b.p2LastName  ?? "").toString(),
          logoFile: a.logoFile || a.logo || a.logoUrl || b.logoFile || b.logo || b.logoUrl || null
        };
        const pts = Number(ptsTable[g.pos] || 0);
        rows.push({ pos: g.pos, team, points: pts });
      }
      rows.sort((a,b)=>a.pos-b.pos);
      return rows;
    }

    return [];
  }

  function buildGeneralFromSteps(){
    const map = new Map();

    for(const stepId of STEP_IDS){
      const stepDoc = classements.get(stepId) || null;
      if(!stepDoc) continue;

      const teams = normalizeStepTeams(stepId, stepDoc);
      if(!teams.length) continue;

      const playedThisStep = new Set();
      const playersArr = Array.isArray(stepDoc?.players) ? stepDoc.players : [];

      function findPlayerObj(firstName, lastName, teamName){
        const wantedKey = canonicalPlayerKey(firstName, lastName);
        const tn = (teamName || "").toString().trim();

        return playersArr.find(p=>{
          const pKey = canonicalPlayerKey(p?.firstName, p?.lastName);
          const pTeam = (p?.teamName || "").toString().trim();
          if(wantedKey && pKey && wantedKey !== pKey) return false;
          if(tn && pTeam && tn !== pTeam) return false;
          return !!wantedKey && !!pKey;
        }) || null;
      }

      for(const row of teams){
        const t = row.team || {};
        const teamName = teamNameOf(t);

        const p1DisplayName = playerDisplay(t.p1FirstName, t.p1LastName);
        const p2DisplayName = playerDisplay(t.p2FirstName, t.p2LastName);

        const p1Canonical = canonicalPlayerKey(t.p1FirstName, t.p1LastName);
        const p2Canonical = canonicalPlayerKey(t.p2FirstName, t.p2LastName);

        const logoSrc = teamLogoSrc(stepId, stepDoc, t);

        const p1Obj = findPlayerObj(t.p1FirstName, t.p1LastName, teamName);
        const p2Obj = findPlayerObj(t.p2FirstName, t.p2LastName, teamName);

        const p1Gender = inferGenderFromPlayerObj(p1Obj);
        const p2Gender = inferGenderFromPlayerObj(p2Obj);

        for(const item of [
          { canonical:p1Canonical, display:p1DisplayName, gender:p1Gender, firstName:t.p1FirstName || "", lastName:t.p1LastName || "" },
          { canonical:p2Canonical, display:p2DisplayName, gender:p2Gender, firstName:t.p2FirstName || "", lastName:t.p2LastName || "" }
        ]){
          if(!item.canonical || !item.display || item.display === "—") continue;

          if(!map.has(item.canonical)){
            map.set(item.canonical, {
              key: item.canonical,
              name: item.display,
              firstName: item.firstName || "",
              lastName: item.lastName || "",
              points: 0,
              steps: new Set(),
              gender: item.gender,
              logo: null
            });
          }

          const rec = map.get(item.canonical);

          rec.points += Number(row.points || 0);
          if(!rec.gender && item.gender) rec.gender = item.gender;
          if(!rec.logo && logoSrc) rec.logo = logoSrc;

          const currentDisplay = playerDisplay(rec.firstName, rec.lastName);
          if(item.display.length > currentDisplay.length){
            rec.firstName = item.firstName;
            rec.lastName = item.lastName;
            rec.name = item.display;
          }

          const mk = `${item.canonical}|${stepId}`;
          if(!playedThisStep.has(mk)){
            playedThisStep.add(mk);
            rec.steps.add(stepId);
          }
        }
      }
    }

    const out = [...map.values()].map(x=>{
      const cfg = getPlayerConfig(x.firstName, x.lastName);
      return {
        key: x.key,
        name: x.name,
        points: x.points,
        stepsPlayed: x.steps.size,
        gender: x.gender || null,
        logo: x.logo || null,
        badge: cfg.badge || null,
        priority: Number(cfg.priority || 0)
      };
    });

    out.sort((a,b)=>{
      if(b.points !== a.points) return b.points - a.points;
      if(a.priority !== b.priority) return a.priority - b.priority;

      const ga = genderRank(a.gender);
      const gb = genderRank(b.gender);
      if(ga !== gb) return ga - gb;

      const order = Array.isArray(generalConfig?.order) ? generalConfig.order : [];
      const ia = order.indexOf(a.key);
      const ib = order.indexOf(b.key);
      if(ia !== -1 || ib !== -1){
        if(ia === -1) return 1;
        if(ib === -1) return -1;
        if(ia !== ib) return ia - ib;
      }

      return a.name.localeCompare(b.name, "fr");
    });

    let lastPts = null;
    let lastRank = 0;
    for(let i=0;i<out.length;i++){
      const pts = out[i].points;
      if(lastPts === null || pts !== lastPts){
        lastPts = pts;
        lastRank = i + 1;
      }
      out[i].rank = lastRank;
    }

    return out;
  }

  function refreshStepOptions(){
    for(const stepId of STEP_IDS){
      const opt = [...sel.options].find(o=>o.value === stepId);
      if(!opt) continue;

      const d = classements.get(stepId) || null;
      const available = !!d;

      const base = `Classement — ${stepLabel(stepId)} (${stepType(stepId)})`;
      if(stepId === "etape1"){
        opt.disabled = false;
        opt.textContent = available ? base : `${base} (à venir)`;
      } else {
        opt.disabled = !available;
        opt.textContent = available ? base : `${base} (à venir)`;
      }
    }
  }

  function renderGeneral(){
    title.textContent = "Classement général";
    hint.textContent = "Affichage du classement général (cumul des points FFT sur les étapes disponibles).";

    const rows = buildGeneralFromSteps();
    sub.textContent = rows.length ? `Joueurs classés : ${rows.length}` : "Aucun classement disponible pour le moment.";

    if(!rows.length){
      box.innerHTML = makeEmpty("Bientôt disponible… (aucune étape publiée).");
      return;
    }

    const cards = rows.map((r)=>`
      <div class="rank-card one-line">
        ${renderGeneralVisual(r)}
        <div class="rk">${esc(String(r.rank))}</div>

        <div class="rmain">
          <div class="rtitle">${esc(r.name)}</div>
        </div>

        <div class="meta-line">
          <span class="meta-pill">⭐ ${esc(String(r.points))} pts</span>
          <span class="meta-pill">🎾 ${esc(String(r.stepsPlayed))} étape(s)</span>
        </div>
      </div>
    `);

    box.innerHTML = `<div class="list">${cards.join("")}</div>`;
  }

  function renderStep(stepId){
    const stepDoc = classements.get(stepId) || null;

    title.textContent = `Classement — ${stepLabel(stepId)} (${stepType(stepId)} mixte)`;

    if(!stepDoc){
      hint.textContent = "⏳ Classement pas encore publié.";
      sub.textContent = "—";
      box.innerHTML = makeEmpty("Dès que le classement est validé en admin, il apparaîtra ici.");
      return;
    }

    hint.textContent = stepDoc?.validatedAt ? "✅ Classement validé." : "📌 Classement publié.";
    const rows = normalizeStepTeams(stepId, stepDoc);

    sub.textContent = rows.length ? `Équipes classées : ${rows.length}` : "Aucun classement disponible.";

    if(!rows.length){
      box.innerHTML = makeEmpty("⏳ En attente des résultats / validation.");
      return;
    }

    const cards = rows.map((r)=>{
      const logoSrc = teamLogoSrc(stepId, stepDoc, r.team);
      return `
        <div class="rank-card">
          ${renderMidLogo(logoSrc, `Logo — ${teamNameOf(r.team)}`)}
          <div class="rk">${esc(String(r.pos))}</div>

          <div class="rmain">
            <div class="rtitle">${esc(teamNameOf(r.team))} — <span style="opacity:.85;">${esc(String(r.points))} pts</span></div>
            <div class="rsub muted">${esc(teamPlayersLine(r.team))}</div>
          </div>

          <div class="tag">#${esc(String(r.pos))}</div>
        </div>
      `;
    });

    box.innerHTML = `<div class="list">${cards.join("")}</div>`;
  }

  function render(){
    refreshStepOptions();
    const v = (sel.value || "general").toLowerCase();
    if(v === "general") renderGeneral();
    else renderStep(v);
  }

  function listenDoc(id){
    return onSnapshot(doc(db, "classements", id), (snap)=>{
      hasAnyListenerOk = true;
      classements.set(id, snap.exists() ? (snap.data() || {}) : null);
      render();
      hint.textContent = "🟢 En direct";
    }, (err)=>{
      console.error("classements/" + id, err);
      if(!hasAnyListenerOk){
        hint.textContent = "🔴 Erreur de connexion (classements).";
        box.innerHTML = makeEmpty("Impossible de charger le classement.");
      }
    });
  }

  onSnapshot(doc(db, "config", "classement_general"), (snap)=>{
    generalConfig = snap.exists() ? (snap.data() || {}) : {};
    if(!generalConfig.players) generalConfig.players = {};
    if(!Array.isArray(generalConfig.order)) generalConfig.order = [];
    render();
  });

  hint.textContent = "Chargement des classements…";

  const unsubs = [];
  unsubs.push(listenDoc("general"));
  for(const s of STEP_IDS) unsubs.push(listenDoc(s));

  sel.addEventListener("change", render);
  render();
</script>

</body>
</html>
