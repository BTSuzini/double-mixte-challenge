<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tirage — Étape 5</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=20260417-etape5-tirage-v2" />
</head>
<body>

<header class="topbar">
  <div class="container">
    <div class="topbar-row topbar-row-step">
      <div class="brand-logo">
        <img src="../assets/img/logo-suzini.png" alt="Logo Suzini">
      </div>

      <div class="step-title-wrap" aria-label="Étape 5">
        <img class="step-title-img" src="../assets/img/etape5.png" alt="Étape 5">
      </div>

      <div class="brand-logo">
        <img src="../assets/img/logo-challenge.png" alt="Logo Challenge">
      </div>
    </div>

    <nav class="nav nav-step">
      <a href="../index.html" title="Accueil" aria-label="Accueil">🏠</a>
      <a href="inscriptions.html">📝 Inscriptions</a>
      <a href="repas.html">🍽️ Repas</a>
      <a href="programmation.html">🗓️ Programmation</a>
      <a href="equipes.html">👥 Équipes</a>
      <a href="tirage.html" aria-current="page">🎲 Tirage</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="card">
    <h2 style="margin:0 0 10px;">🎲 Tirage au sort</h2>
    <p class="muted" id="statusText" style="margin:0;">Chargement…</p>

    <div class="grid" style="margin-top:12px;">
      <button class="btn" id="btnReplay" style="font-weight:900; color:#111; display:none;">▶️ Replay roulette</button>
      <button class="btn" id="btnStopReplay" style="font-weight:900; color:#111; display:none;">⏹️ Stop replay</button>
    </div>

    <p class="muted" id="modeBadge" style="margin-top:10px;"></p>
    <p class="muted" id="validatedAt" style="margin-top:6px;"></p>
  </section>

  <section class="card" id="panelRoulette" style="display:none;">
    <h2 style="margin:0 0 10px;">🎰 Roulette</h2>
    <div class="roulette-wheel" id="wheel">—</div>
    <div class="muted" id="wheelSub" style="margin-top:8px;">—</div>
  </section>

  <section class="card" id="panelBracket" style="display:none;">
    <h2 style="margin:0 0 10px;">📋 Tableau principal (16)</h2>
    <div id="bracketList" class="bracket-list"></div>
  </section>

  <section class="card" id="panelUrne" style="display:none !important;">
    <h2 style="margin:0 0 10px;">📥 Urne</h2>
    <div id="urneList" style="display:grid; gap:8px;"></div>
  </section>

  <section class="card" id="panelSeeds" style="display:none;">
    <h2 style="margin:0 0 10px;">🏷️ Têtes de série</h2>

    <div class="grid">
      <div class="card" style="margin:0;">
        <div style="font-weight:1000;">🏷️ TS #1 — ligne 16</div>
        <div class="muted" id="seed1">—</div>
      </div>
      <div class="card" style="margin:0;">
        <div style="font-weight:1000;">🏷️ TS #2 — ligne 1</div>
        <div class="muted" id="seed2">—</div>
      </div>
      <div class="card" style="margin:0;">
        <div style="font-weight:1000;">🏷️ TS #3</div>
        <div class="muted" id="seed3">—</div>
      </div>
      <div class="card" style="margin:0;">
        <div style="font-weight:1000;">🏷️ TS #4</div>
        <div class="muted" id="seed4">—</div>
      </div>
    </div>

    <p class="muted" id="seed34Info" style="margin:10px 0 0;">Tirage TS3/TS4 en attente.</p>
  </section>

</main>

<style>
  .topbar-row-step{
    grid-template-columns: var(--logo-size) 1fr var(--logo-size);
  }
  .step-title-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: calc(var(--logo-size) * 0.55);
  }
  .step-title-img{
    width: min(520px, 100%);
    max-height: 88px;
    height: auto;
    object-fit: contain;
    display:block;
    filter: drop-shadow(0 1px 0 rgba(0,0,0,.15));
  }

  .nav-step{
    justify-content: space-between;
    gap: 8px;
  }
  .nav-step::after{
    content:"";
    flex:auto;
  }
  .nav-step a{
    padding:8px 12px;
    flex: 1 1 auto;
    text-align:center;
  }

  .nav a[aria-current="page"]{
    background: rgba(255,255,255,.26);
    border-color: rgba(255,255,255,.45);
    box-shadow: 0 6px 14px rgba(0,0,0,.10);
  }

  @media (max-width: 420px){
    .nav-step a{
      padding:7px 10px;
      font-size: 13px;
    }
    .step-title-img{ max-height: 74px; }
  }

  #panelRoulette.card, #panelBracket.card{
    padding:12px;
  }
  #panelUrne.card, #panelSeeds.card{
    padding:12px;
  }

  .roulette-wheel{
    height:58px;
    border-radius:14px;
    border:1px solid #e6e6e6;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:1000;
    font-size:17px;
    letter-spacing:.2px;
    background:linear-gradient(180deg,#fff,#fafafa);
    padding:0 10px;
    text-align:center;
  }

  .bracket-list{
    display:grid;
    gap:10px;
  }

  .match-block{
    border:1px solid #eee;
    border-radius:14px;
    background:#fff;
    padding:10px;
    box-shadow: 0 4px 10px rgba(0,0,0,.03);
  }

  .match-title{
    font-size:12px;
    font-weight:1000;
    opacity:.6;
    margin-bottom:8px;
    letter-spacing:.3px;
  }

  .line-row{
    display:grid;
    grid-template-columns: 42px 1fr;
    gap:8px;
    align-items:center;
    min-width:0;
  }

  .line-row + .line-row{
    margin-top:6px;
  }

  .line-no{
    font-weight:1000;
    color:#666;
    text-align:center;
    white-space:nowrap;
  }

  .line-team{
    border:1px solid #f0f0f0;
    border-radius:10px;
    background:#fafafa;
    padding:8px 10px;
    font-weight:900;
    font-size:14px;
    line-height:1.2;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .line-team.seed{
    background:#fff9e8;
    border-color:#f1dca1;
  }

  .line-team.bye{
    background:#f6f6f6;
    border-color:#e6e6e6;
    font-style:italic;
  }

  .pill{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    border:1px solid #eee;
    background:#fafafa;
    white-space:nowrap;
  }

  .urne-item{
    margin:0;
  }

  .urne-row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }

  .urne-name{
    font-weight:900;
    font-size:13px;
    line-height:1.25;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:normal;
    word-break:break-word;
  }

  @media (max-width: 360px){
    .roulette-wheel{ height:54px; font-size:16px; }
    .line-team{ font-size:13px; }
  }
</style>

<script type="module">
  import { db } from "../assets/js/firebase.js";
  import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const scope = "etape5";
  const DRAW_REF = doc(db, "tirages", scope);

  const statusText = document.getElementById("statusText");
  const modeBadge = document.getElementById("modeBadge");
  const validatedAtEl = document.getElementById("validatedAt");

  const panelRoulette = document.getElementById("panelRoulette");
  const panelBracket = document.getElementById("panelBracket");
  const panelUrne = document.getElementById("panelUrne");
  const panelSeeds = document.getElementById("panelSeeds");

  const seed1El = document.getElementById("seed1");
  const seed2El = document.getElementById("seed2");
  const seed3El = document.getElementById("seed3");
  const seed4El = document.getElementById("seed4");
  const seed34Info = document.getElementById("seed34Info");

  const wheel = document.getElementById("wheel");
  const wheelSub = document.getElementById("wheelSub");

  const urneList = document.getElementById("urneList");
  const bracketList = document.getElementById("bracketList");

  const btnReplay = document.getElementById("btnReplay");
  const btnStopReplay = document.getElementById("btnStopReplay");

  let currentDraw = null;

  let shownCount = 0;
  let revealedShown = [];
  let liveAnimating = false;

  let replayMode = false;
  let replayAbort = false;

  function esc(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function fmtDate(ts){
    try{
      const d = ts?.toDate ? ts.toDate() : null;
      if(!d) return "";
      return d.toLocaleString("fr-FR", {
        year:"numeric", month:"long", day:"numeric",
        hour:"2-digit", minute:"2-digit"
      });
    }catch{
      return "";
    }
  }

  function rouletteLabelTeam(t){
    if(!t) return "—";
    const tn = t.teamName || "Équipe";
    const p1 = t.p1FirstName || "?";
    const p2 = t.p2FirstName || "?";
    return `${tn} (${p1} / ${p2})`;
  }

  function teamNameOnly(t){
    return (t && t.teamName) ? t.teamName : "—";
  }

  function drawHasData(draw){
    return !!(
      draw &&
      draw.seed1 &&
      draw.seed2 &&
      draw.seed3 &&
      draw.seed4 &&
      Array.isArray(draw.pool) &&
      Array.isArray(draw.order)
    );
  }

  function parseToken(token){
    const s = String(token || "");
    if(s.startsWith("SEED34:")) return { type:"seed34", value:s.slice(7) };
    if(s.startsWith("BYE:")) return { type:"bye", value:Number(s.slice(4)) };
    if(s.startsWith("TEAM:")) return { type:"team", value:s.slice(5) };
    return { type:"unknown", value:s };
  }

  function byeCount(draw){
    const totalTeams = 4 + (Array.isArray(draw?.pool) ? draw.pool.length : 0);
    return Math.max(0, 16 - totalTeams);
  }

  function mandatoryByeLines(draw){
    const n = byeCount(draw);
    const lines = [];
    if(n >= 1) lines.push(15);
    if(n >= 2) lines.push(2);
    if(n >= 3) lines.push(7);
    if(n >= 4) lines.push(10);
    return lines;
  }

  function allLines(){
    return Array.from({ length:16 }, (_,i)=> i+1);
  }

  function buildState(draw, revealedTokens){
    const lines = new Map();
    const pool = Array.isArray(draw?.pool) ? draw.pool : [];
    const poolById = new Map(pool.map(x => [x.id, x]));

    const s1 = draw?.seed1 || null;
    const s2 = draw?.seed2 || null;
    const s3 = draw?.seed3 || null;
    const s4 = draw?.seed4 || null;

    if(s2) lines.set(1, { type:"team", team:s2, seed:2 });
    if(s1) lines.set(16, { type:"team", team:s1, seed:1 });

    for(const line of mandatoryByeLines(draw)){
      lines.set(line, { type:"bye" });
    }

    let seed34Placed = false;

    for(const tok of revealedTokens){
      const p = parseToken(tok);

      if(p.type === "seed34" && !seed34Placed){
        const picked = (p.value === s3?.id) ? s3 : (p.value === s4?.id ? s4 : null);
        const other = picked?.id === s3?.id ? s4 : s3;

        if(picked) lines.set(8, { type:"team", team:picked, seed:(picked?.id === s3?.id ? 3 : 4) });
        if(other)  lines.set(9, { type:"team", team:other,  seed:(other?.id === s3?.id ? 3 : 4) });

        seed34Placed = true;
      }

      if(p.type === "bye" && Number.isFinite(p.value)){
        lines.set(p.value, { type:"bye" });
      }
    }

    const occupied = new Set(lines.keys());
    const freeLines = allLines().filter(n => !occupied.has(n));

    for(const tok of revealedTokens){
      const p = parseToken(tok);
      if(p.type !== "team") continue;

      const team = poolById.get(p.value);
      if(!team) continue;

      const nextFree = freeLines.shift();
      if(!nextFree) break;

      lines.set(nextFree, { type:"team", team, seed:null });
    }

    return { lines, poolById, seed34Placed };
  }

  function computeLists(draw){
    const order = Array.isArray(draw?.order) ? draw.order : [];
    const revealed = Number(draw?.revealed || 0);

    const revealedTokens = order.slice(0, revealed);
    const remainingTokens = order.slice(revealed);

    return { revealedTokens, remainingTokens };
  }

  function lineHtml(lineNo, obj){
    if(!obj){
      return `
        <div class="line-row">
          <div class="line-no">L${lineNo}</div>
          <div class="line-team">—</div>
        </div>
      `;
    }

    if(obj.type === "bye"){
      return `
        <div class="line-row">
          <div class="line-no">L${lineNo}</div>
          <div class="line-team bye">BYE</div>
        </div>
      `;
    }

    const cls = obj.seed ? "line-team seed" : "line-team";
    const name = obj.seed ? `TS #${obj.seed} — ${teamNameOnly(obj.team)}` : teamNameOnly(obj.team);

    return `
      <div class="line-row">
        <div class="line-no">L${lineNo}</div>
        <div class="${cls}">${esc(name)}</div>
      </div>
    `;
  }

  function renderBracket(draw, revealedTokens){
    panelBracket.style.display = "block";

    const { lines } = buildState(draw, revealedTokens);

    const blocks = [];
    for(let i=1;i<=16;i+=2){
      blocks.push(`
        <div class="match-block">
          <div class="match-title">MATCH ${((i+1)/2)}</div>
          ${lineHtml(i, lines.get(i))}
          ${lineHtml(i+1, lines.get(i+1))}
        </div>
      `);
    }

    bracketList.innerHTML = blocks.join("");
  }

  function renderSeeds(draw, revealedTokens){
    panelSeeds.style.display = "block";

    seed1El.textContent = draw?.seed1 ? rouletteLabelTeam(draw.seed1) : "—";
    seed2El.textContent = draw?.seed2 ? rouletteLabelTeam(draw.seed2) : "—";
    seed3El.textContent = draw?.seed3 ? rouletteLabelTeam(draw.seed3) : "—";
    seed4El.textContent = draw?.seed4 ? rouletteLabelTeam(draw.seed4) : "—";

    const state = buildState(draw, revealedTokens);

    if(!state.seed34Placed){
      seed34Info.textContent = "Tirage TS3 / TS4 en attente → lignes 8 et 9.";
      return;
    }

    const line8 = state.lines.get(8);
    const line9 = state.lines.get(9);

    seed34Info.textContent = `Ligne 8 : ${teamNameOnly(line8?.team)} — Ligne 9 : ${teamNameOnly(line9?.team)}`;
  }

  function renderUrne(draw, revealedTokens, remainingTokens){
    panelUrne.style.display = "none";
    urneList.innerHTML = "";
  }

  function tokenToRouletteLabel(draw, token){
    const p = parseToken(token);

    if(p.type === "seed34"){
      const t = (draw.seed3?.id === p.value) ? draw.seed3 : (draw.seed4?.id === p.value ? draw.seed4 : null);
      return `TS3/TS4 → ${rouletteLabelTeam(t)}`;
    }

    if(p.type === "bye"){
      return `BYE → ligne ${p.value}`;
    }

    if(p.type === "team"){
      const poolById = new Map((draw.pool || []).map(x => [x.id, x]));
      return rouletteLabelTeam(poolById.get(p.value));
    }

    return "—";
  }

  async function rouletteSpin(finalText, durationMs = 1300){
    const start = Date.now();
    wheelSub.textContent = replayMode ? "Replay en cours…" : "La roulette tourne…";
    const fake = ["🌪️","🎾","🔥","🍀","⚡️","🎲","🏖️"];

    return new Promise((resolve) => {
      const tick = () => {
        if(replayAbort){
          resolve("aborted");
          return;
        }
        const t = Date.now() - start;
        if(t >= durationMs){
          wheel.textContent = finalText;
          wheelSub.textContent = "✅ Révélé";
          resolve("done");
          return;
        }
        wheel.textContent =
          fake[Math.floor(Math.random()*fake.length)] + " " +
          fake[Math.floor(Math.random()*fake.length)];
        requestAnimationFrame(tick);
      };
      tick();
    });
  }

  function updateStatus(draw){
    const st = draw?.status || "idle";
    const revealed = Number(draw?.revealed || 0);
    const total = Array.isArray(draw?.order) ? draw.order.length : 0;

    if(replayMode){
      modeBadge.textContent = "🎥 Mode REPLAY";
    } else if(st === "running"){
      modeBadge.textContent = "🟢 En direct";
    } else {
      modeBadge.textContent = "";
    }

    if(!draw){
      statusText.textContent = "⏳ Tirage non prêt.";
      validatedAtEl.textContent = "";
      return;
    }

    if(st === "idle"){
      statusText.textContent = drawHasData(draw)
        ? "📥 Urne chargée. Tirage pas encore lancé."
        : "⏳ Tirage non prêt côté admin.";
      validatedAtEl.textContent = "";
      return;
    }

    if(st === "running"){
      statusText.textContent = `🎰 Tirage en cours… (${revealed}/${total} révélations)`;
      validatedAtEl.textContent = "";
      return;
    }

    if(st === "pending_validation"){
      statusText.textContent = "🏁 Tirage fini — en attente de validation.";
      validatedAtEl.textContent = "";
      return;
    }

    if(st === "validated"){
      statusText.textContent = "✅ Tirage validé.";
      const d = fmtDate(draw.validatedAt);
      validatedAtEl.textContent = d ? ("🗓️ Validé le " + d) : "";
      return;
    }

    statusText.textContent = "—";
  }

  async function applyLiveRevealAnimation(draw){
    if(replayMode) return;
    if(liveAnimating) return;

    const st = draw?.status || "idle";

    panelRoulette.style.display = "block";
    panelBracket.style.display = "block";
    panelUrne.style.display = "none";
    panelSeeds.style.display = "block";

    const { revealedTokens, remainingTokens } = computeLists(draw);

    renderSeeds(draw, revealedShown);
    renderBracket(draw, revealedShown);
    renderUrne(draw, revealedShown, remainingTokens);

    if(st !== "running" && st !== "pending_validation" && st !== "validated"){
      wheel.textContent = "—";
      wheelSub.textContent = "—";
      return;
    }

    if(revealedTokens.length <= shownCount){
      return;
    }

    liveAnimating = true;

    while(shownCount < revealedTokens.length){
      const token = revealedTokens[shownCount];

      await rouletteSpin(tokenToRouletteLabel(draw, token), 1300);

      revealedShown.push(token);
      shownCount++;

      const { remainingTokens: rem2 } = computeLists(currentDraw);
      renderSeeds(currentDraw, revealedShown);
      renderBracket(currentDraw, revealedShown);
      renderUrne(currentDraw, revealedShown, rem2);
    }

    liveAnimating = false;
  }

  async function doReplay(draw){
    if(!draw || draw.status !== "validated"){
      alert("Replay disponible uniquement quand le tirage est validé.");
      return;
    }

    replayMode = true;
    replayAbort = false;

    btnReplay.style.display = "none";
    btnStopReplay.style.display = "inline-flex";

    updateStatus(draw);

    shownCount = 0;
    revealedShown = [];
    wheel.textContent = "—";
    wheelSub.textContent = "Replay en cours…";

    panelRoulette.style.display = "block";
    panelBracket.style.display = "block";
    panelSeeds.style.display = "block";
    panelUrne.style.display = "none";

    renderSeeds(draw, revealedShown);
    renderBracket(draw, revealedShown);

    const revealedTokens = (draw.order || []).slice(0, Number(draw.revealed || 0));

    for(let i=0; i<revealedTokens.length; i++){
      if(replayAbort) break;

      const token = revealedTokens[i];
      await rouletteSpin(tokenToRouletteLabel(draw, token), 1300);

      revealedShown.push(token);
      shownCount = revealedShown.length;

      renderSeeds(draw, revealedShown);
      renderBracket(draw, revealedShown);
    }

    btnStopReplay.style.display = "none";
    btnReplay.style.display = "inline-flex";

    replayMode = false;
    replayAbort = false;

    panelUrne.style.display = "none";
    wheelSub.textContent = "✅ Replay terminé";

    updateStatus(currentDraw);

    const { remainingTokens } = computeLists(currentDraw);
    renderSeeds(currentDraw, revealedShown);
    renderBracket(currentDraw, revealedShown);
    renderUrne(currentDraw, revealedShown, remainingTokens);
  }

  btnReplay.onclick = async (e)=>{
    e.preventDefault();
    await doReplay(currentDraw);
  };

  btnStopReplay.onclick = (e)=>{
    e.preventDefault();
    replayAbort = true;
  };

  onSnapshot(DRAW_REF, async (snap)=>{
    currentDraw = snap.exists() ? (snap.data() || {}) : null;

    if(!currentDraw){
      panelRoulette.style.display = "none";
      panelBracket.style.display = "none";
      panelUrne.style.display = "none";
      panelSeeds.style.display = "none";

      btnReplay.style.display = "none";
      btnStopReplay.style.display = "none";

      statusText.textContent = "⏳ Tirage non prêt.";
      modeBadge.textContent = "";
      validatedAtEl.textContent = "";
      return;
    }

    panelRoulette.style.display = "block";
    panelBracket.style.display = "block";
    panelUrne.style.display = "none";
    panelSeeds.style.display = "block";

    updateStatus(currentDraw);

    if(currentDraw.status === "validated"){
      if(!replayMode) btnReplay.style.display = "inline-flex";
    } else {
      btnReplay.style.display = "none";
      btnStopReplay.style.display = "none";
    }

    const { revealedTokens, remainingTokens } = computeLists(currentDraw);

    renderSeeds(currentDraw, revealedShown);
    renderBracket(currentDraw, revealedShown);
    renderUrne(currentDraw, revealedShown, remainingTokens);

    if(!replayMode && currentDraw.status === "idle"){
      shownCount = 0;
      revealedShown = [];
      wheel.textContent = "—";
      wheelSub.textContent = "—";
      renderSeeds(currentDraw, revealedShown);
      renderBracket(currentDraw, revealedShown);
      renderUrne(currentDraw, revealedShown, remainingTokens);
      return;
    }

    if(!replayMode && (currentDraw.status === "pending_validation" || currentDraw.status === "validated")){
      revealedShown = revealedTokens.slice(0);
      shownCount = revealedShown.length;
      renderSeeds(currentDraw, revealedShown);
      renderBracket(currentDraw, revealedShown);
      renderUrne(currentDraw, revealedShown, remainingTokens);
      return;
    }

    if(!replayMode){
      await applyLiveRevealAnimation(currentDraw);
    }
  }, (err)=>{
    console.error(err);
    statusText.textContent = "🔴 Erreur de connexion au tirage.";
  });
</script>

</body>
</html>
