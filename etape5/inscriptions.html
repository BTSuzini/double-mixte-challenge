<script type="module">

import { db } from "../assets/js/firebase.js";

import {
doc,
onSnapshot,
collection,
addDoc,
setDoc,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const SCOPE = "etape5";

const COL_PRIVATE = "inscriptions_etape5_private";
const COL_PUBLIC  = "equipes_etape5_public";
const COL_PAYMENTS = "paiements_challenge";

const form = document.getElementById("signupForm");
const statusEl = document.getElementById("status");
const gateMsgEl = document.getElementById("gateMsg");
const submitBtn = document.getElementById("submitBtn");

let gateState = "not_open";
let cfg = {};

function readFormData(){
return{
createdAt: serverTimestamp(),
teamName: form.teamName.value.trim(),

p1FirstName: form.p1FirstName.value.trim(),
p1LastName: form.p1LastName.value.trim(),
p1Licence: form.p1Licence.value.trim(),
p1Phone: form.p1Phone.value.trim(),

p2FirstName: form.p2FirstName.value.trim(),
p2LastName: form.p2LastName.value.trim(),
p2Licence: form.p2Licence.value.trim(),
p2Phone: form.p2Phone.value.trim()
};
}

form.addEventListener("submit", async(e)=>{

e.preventDefault();

if(gateState!=="open"){
statusEl.textContent="⛔ Inscriptions non ouvertes.";
return;
}

submitBtn.disabled=true;

try{

const data=readFormData();

const ref=await addDoc(collection(db,COL_PRIVATE),data);

await setDoc(doc(db,COL_PUBLIC,ref.id),{
createdAt: serverTimestamp(),
teamName:data.teamName,
p1FirstName:data.p1FirstName,
p2FirstName:data.p2FirstName,
list:"main",
stby:false
});

form.reset();

statusEl.textContent="✅ Inscription enregistrée";

}catch(err){

statusEl.textContent="❌ Erreur";

}

submitBtn.disabled=false;

});

const cfgRef=doc(db,"config","etape5");

onSnapshot(cfgRef,(snap)=>{

const d=snap.exists()?snap.data():{};
cfg=d||{};

gateState=d.inscriptionsState||"not_open";

if(gateState==="open"){
gateMsgEl.textContent="✅ Inscriptions ouvertes";
submitBtn.disabled=false;
}else{
gateMsgEl.textContent="⏳ Inscriptions non ouvertes";
submitBtn.disabled=true;
}

});

</script>

</body>
