<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Classement Général</title>

<link rel="stylesheet" href="../assets/css/main.css">

</head>

<body>

<h2>Admin classement général</h2>

<div id="classement"></div>

<script type="module">

import { db } from "../assets/js/firebase.js"

import {
doc,
onSnapshot,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"

const refConfig = doc(db,"config","classement_general")

let config = {
players:{},
order:[]
}

const container = document.getElementById("classement")

function render(){

if(!config.order) return

container.innerHTML = config.order.map((player,i)=>`

<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">

<div>${i+1}</div>

<div style="flex:1">${player}</div>

<button onclick="moveUp('${player}')">↑</button>
<button onclick="moveDown('${player}')">↓</button>

</div>

`).join("")

}

window.moveUp = async function(key){

const index = config.order.indexOf(key)

if(index <= 0) return

const temp = config.order[index-1]

config.order[index-1] = key

config.order[index] = temp

await setDoc(refConfig,config)

}

window.moveDown = async function(key){

const index = config.order.indexOf(key)

if(index === config.order.length-1) return

const temp = config.order[index+1]

config.order[index+1] = key

config.order[index] = temp

await setDoc(refConfig,config)

}

onSnapshot(refConfig,(snap)=>{

if(snap.exists()) config = snap.data()

render()

})

</script>

</body>
</html>
