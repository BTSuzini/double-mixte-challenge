<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Suzini Beach Tennis Double Mixte Challenge</title>

  <link rel="stylesheet" href="assets/css/main.css?v=20260301-home-challenge" />
</head>

<body>

<header class="topbar">
  <div class="container">

    <!-- ✅ Bandeau repris de pages/reglement (adapté aux chemins racine) -->
    <div class="topbar-row">
      <div class="brand-logo">
        <img src="assets/img/logo-suzini.png" alt="Logo Suzini">
      </div>

      <div class="brand-title" style="display:flex;align-items:center;justify-content:center;">
        <img src="assets/img/challenge-gen.png"
             alt="Suzini Beach Tennis Double Mixte Challenge"
             style="width:min(560px, 100%);max-height:90px;height:auto;object-fit:contain;display:block;filter:drop-shadow(0 1px 0 rgba(0,0,0,.15));">
      </div>

      <div class="brand-logo">
        <img src="assets/img/logo-challenge.png" alt="Logo Challenge">
      </div>
    </div>

  </div>
</header>

<main class="container">

  <!-- ========================= -->
  <!-- ACCÈS TOURNOI -->
  <!-- ========================= -->
  <section class="card">
    <h2>🎾 Accès tournoi</h2>

    <div class="grid">
      <a class="btn" href="etape1/equipes.html">🎾 Étape 1</a>
      <a class="btn" href="etape2/equipes.html">🎾 Étape 2</a>
    </div>
  </section>

  <!-- ========================= -->
  <!-- ACCÈS ORGANISATEURS -->
  <!-- ========================= -->
  <section class="card">
    <h2>🔐 Accès organisateurs</h2>

    <div class="grid">

      <a class="btn" href="#" id="btnAdmin">
        🛠️ Mode Admin
      </a>

      <a class="btn" href="#" id="btnJAT">
        🎾 Espace JAT
      </a>

      <a class="btn" href="#" id="btnLogout">
        🚪 Déconnexion
      </a>

    </div>

    <p class="muted" id="authHint" style="margin-top:10px;">
      Accès sécurisé organisateurs.
    </p>
  </section>

</main>

<!-- ================================================= -->
<!-- FIREBASE -->
<!-- ================================================= -->
<script type="module">

import { auth } from "./assets/js/firebase.js";
import { loginAndRedirect, logout, getRoleByEmail }
  from "./assets/js/session.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";


const btnAdmin = document.getElementById("btnAdmin");
const btnJAT   = document.getElementById("btnJAT");
const btnLogout = document.getElementById("btnLogout");
const hint = document.getElementById("authHint");


/* =====================================================
   ADMIN
===================================================== */
btnAdmin.onclick = async (e)=>{
  e.preventDefault();

  if(!auth.currentUser){
    await loginAndRedirect();
  }

  const u = auth.currentUser;
  if(!u){
    alert("Connexion annulée.");
    return;
  }

  const role = await getRoleByEmail(u.email);

  if(role !== "admin"){
    alert("Accès réservé aux administrateurs.");
    return;
  }

  window.location.href = "admin/index.html?scope=general";
};


/* =====================================================
   JAT
===================================================== */
btnJAT.onclick = async (e)=>{
  e.preventDefault();

  if(!auth.currentUser){
    await loginAndRedirect();
  }

  const u = auth.currentUser;
  if(!u){
    alert("Connexion annulée.");
    return;
  }

  const role = await getRoleByEmail(u.email);

  if(role !== "admin" && role !== "jat"){
    alert("Accès réservé JAT.");
    return;
  }

  window.location.href = "jat/index.html";
};


/* =====================================================
   LOGOUT
===================================================== */
btnLogout.onclick = async (e)=>{
  e.preventDefault();
  await logout();
};


/* =====================================================
   STATUS USER
===================================================== */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    hint.textContent = "Non connecté.";
    return;
  }

  try{
    const role = await getRoleByEmail(user.email);
    hint.textContent =
      `Connecté : ${user.email} — rôle : ${role || "aucun"}`;
  }catch{
    hint.textContent = "Utilisateur connecté.";
  }
});

</script>

</body>
</html>
